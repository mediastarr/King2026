<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#0ff;font-family:monospace;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.top{height:30px;background:#111;display:flex;align-items:center;padding:0 10px;font-size:14px;font-weight:bold;border-bottom:3px solid #0ff}
.display{background:#001a1a;padding:15px;text-align:center;border-bottom:3px solid #0ff}
.display-text{font-size:32px;color:#0ff;min-height:40px;font-weight:bold}
.display-hint{font-size:12px;color:#0aa;margin-top:5px}
.keyboard{flex:1;background:#000;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:5px;overflow:auto}
.key{background:#222;border:3px solid #555;color:#fff;font-size:24px;font-weight:bold;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:60px}
.key:active{background:#0ff;color:#000;border-color:#0ff}
.key.big{grid-column:span 2;font-size:18px}
.key.enter{background:#004400;border-color:#0f0;color:#0f0;font-size:20px}
.key.back{background:#440000;border-color:#f00;color:#f88;font-size:20px}
</style>
</head>
<body>
<div class="top">TAP TEST - WITH DOUBLE BLOCK</div>
<div class="display">
  <div class="display-text" id="out">READY</div>
  <div class="display-hint" id="hint">Tap a letter</div>
</div>
<div class="keyboard" id="kb"></div>

<script>
let text = '';
let lastTap = 0;
let lastKey = '';

function update(msg, hint) {
  document.getElementById('out').textContent = msg;
  document.getElementById('hint').textContent = hint || '';
}

// Create keyboard EXACTLY like test
const kb = document.getElementById('kb');
'ABCDEFGH'.split('').forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.textContent = l;
  btn.type = 'button';
  btn.onclick = function() {
    const now = Date.now();
    // BLOCK DOUBLE
    if (l === lastKey && (now - lastTap) < 300) {
      update(text || 'READY', 'BLOCKED double ' + l);
      return;
    }
    lastKey = l;
    lastTap = now;
    
    text += l;
    update(text, 'Added ' + l);
    btn.style.background = '#0ff';
    setTimeout(() => btn.style.background = '', 150);
  };
  kb.appendChild(btn);
});

// ENTER
const enter = document.createElement('button');
enter.className = 'key big enter';
enter.textContent = 'ENTER';
enter.type = 'button';
enter.onclick = () => {
  update('ENTER!', 'Text: ' + text);
  alert('ENTER: ' + text);
};
kb.appendChild(enter);

// BACK
const back = document.createElement('button');
back.className = 'key big back';
back.textContent = 'BACK';
back.type = 'button';
back.onclick = () => {
  update('BACK!', '');
  alert('BACK works');
  text = '';
  update('READY', 'Cleared');
};
kb.appendChild(back);

// More letters
'IJKL'.split('').forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.textContent = l;
  btn.type = 'button';
  btn.onclick = function() {
    const now = Date.now();
    if (l === lastKey && (now - lastTap) < 300) {
      update(text, 'BLOCKED');
      return;
    }
    lastKey = l;
    lastTap = now;
    text += l;
    update(text, 'Added ' + l);
  };
  kb.appendChild(btn);
});

update('READY', 'Tap letters - double tap blocked');
</script>
</body>
</html>
