<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StarrTube</title>
<meta name="viewport" content="width=600, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
:root { --bg:#000; --text:#FFF; --accent:#0FF; --secondary:#888; --card:#111; --border:#333; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#1a1a1a; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:system-ui; }
#app { width:600px; height:600px; background:var(--bg); color:var(--text); display:flex; flex-direction:column; position:relative; }
#header { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--border); }
.logo { display:flex; align-items:center; gap:8px; font-weight:700; }
.logo-yt { width:28px; height:20px; background:#F00; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:12px; }
#clock { color:var(--secondary); font-size:14px; }
#content { flex:1; position:relative; overflow:hidden; }
.screen { position:absolute; inset:0; display:none; overflow-y:auto; }
.screen.active { display:block; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
.video-card { background:var(--card); border:2px solid transparent; border-radius:8px; overflow:hidden; cursor:pointer; }
.video-card.focused { border-color:var(--accent); }
.thumb { aspect-ratio:16/9; background:#000; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.info { padding:8px; }
.title { font-size:13px; font-weight:600; line-height:1.3; height:34px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.channel { font-size:11px; color:var(--secondary); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#tabs { height:60px; display:flex; border-top:1px solid var(--border); }
.tab { flex:1; background:none; border:none; color:var(--secondary); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-size:11px; cursor:pointer; }
.tab.active { color:var(--accent); }
.tab.focused { background:rgba(0,255,255,0.1); }
.tab-icon { font-size:22px; }
.focusable { outline:none; }
.focusable.focused { outline:2px solid var(--accent); outline-offset:-2px; }
#keyboard { position:absolute; inset:60px 0 0 0; background:var(--bg); display:none; flex-direction:column; z-index:100; }
#keyboard.show { display:flex; }
.kb-display { height:60px; padding:0 16px; display:flex; align-items:center; font-size:20px; color:var(--accent); border-bottom:1px solid var(--border); }
.kb-keys { flex:1; display:flex; flex-direction:column; justify-content:center; padding:12px; gap:8px; }
.kb-row { display:flex; gap:6px; justify-content:center; }
.key { width:52px; height:48px; background:var(--card); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; cursor:pointer; }
.key.wide { width:80px; }
.key.focused { background:var(--accent); color:#000; }
#player { position:absolute; inset:0; background:#000; display:none; z-index:200; }
#player.show { display:block; }
#player iframe { width:100%; height:100%; border:0; }
#menuOverlay { position:absolute; inset:60px 0 60px 0; background:var(--bg); display:none; flex-direction:column; z-index:150; padding:20px; gap:12px; }
#menuOverlay.show { display:flex; }
.menu-item { padding:20px; background:var(--card); border:2px solid transparent; border-radius:8px; text-align:left; font-size:16px; font-weight:600; cursor:pointer; }
.menu-item.focused { border-color:var(--accent); }
.loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--secondary); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo"><div class="logo-yt">▶</div><span>StarrTube</span></div>
    <div id="clock">00:00</div>
  </div>
  <div id="content">
    <div id="home" class="screen active"><div class="grid" id="homeGrid"></div></div>
    <div id="search" class="screen">
      <div style="padding:12px;"><div class="video-card focusable" id="searchBtn" style="padding:16px;text-align:center;">Search YouTube</div></div>
      <div class="grid" id="searchGrid"></div>
    </div>
    <div id="shorts" class="screen"><div class="grid" id="shortsGrid"></div></div>
    <div id="history" class="screen"><div class="grid" id="historyGrid"></div></div>
  </div>
  <div id="tabs">
    <button class="tab focusable active" data-tab="home"><div class="tab-icon">⌂</div><div>Home</div></button>
    <button class="tab focusable" data-tab="search"><div class="tab-icon">⌕</div><div>Search</div></button>
    <button class="tab focusable" data-tab="shorts"><div class="tab-icon">◫</div><div>Shorts</div></button>
    <button class="tab focusable" data-tab="history"><div class="tab-icon">↻</div><div>History</div></button>
    <button class="tab focusable" data-tab="menu"><div class="tab-icon">⋮</div><div>Menu</div></button>
  </div>
  <div id="keyboard">
    <div class="kb-display" id="kbDisplay"></div>
    <div class="kb-keys" id="kbKeys"></div>
  </div>
  <div id="player"><div id="playerFrame"></div></div>
  <div id="menuOverlay">
    <button class="menu-item focusable" data-menu="home">Go Home <span style="float:right">⌂</span></button>
    <button class="menu-item focusable" data-menu="account">Account <span style="float:right">👤</span></button>
    <button class="menu-item focusable" data-menu="contrast">Contrast <span style="float:right">◐</span></button>
    <button class="menu-item focusable" data-menu="live">Live <span style="float:right">●</span></button>
    <button class="menu-item focusable" data-menu="close">Close <span style="float:right">✕</span></button>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let currentFocus = null;

function $(id) { return document.getElementById(id); }

function openMenu() {
  $('menuOverlay').classList.add('show');
  setTimeout(() => focusElement($('menuOverlay').querySelector('.focusable')), 50);
}

function closeMenu() {
  $('menuOverlay').classList.remove('show');
  focusElement(document.querySelector('[data-tab="menu"]'));
}

function handleMenu(a) {
  closeMenu();
  if (a === 'home') switchTab('home');
  if (a === 'live') loadLive();
  if (a === 'account') alert('Account');
}

async function loadLive() {
  homeGrid.innerHTML = '<div class="loading">Loading...</div>';
  switchTab('home');
  const v = await search({eventType:'live', q:'live'});
  homeGrid.innerHTML = ''; v.forEach(x => homeGrid.appendChild(card(x)));
}

function init() {
  setInterval(() => clock.textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), 1000);
  buildKB(); loadHome(); setupNav();
  setTimeout(() => focusElement(document.querySelector('.tab')), 200);
}

function getFocus() {
  const a = document.querySelector('#player.show, #keyboard.show, #menuOverlay.show') || app;
  return Array.from(a.querySelectorAll('.focusable')).filter(e => e.offsetParent);
}

function focusElement(el) {
  if (!el) return;
  document.querySelectorAll('.focused').forEach(e => e.classList.remove('focused'));
  el.classList.add('focused'); currentFocus = el; el.scrollIntoView({block:'nearest'});
}

function move(dir) {
  const items = getFocus(); if (!items.length) return;
  if (!currentFocus ||!items.includes(currentFocus)) return focusElement(items[0]);

  const kb = keyboard.classList.contains('show');
  const menu = menuOverlay.classList.contains('show');

  if (kb && currentFocus.classList.contains('key')) {
    const row = currentFocus.closest('.kb-row');
    const rows = Array.from(kbKeys.querySelectorAll('.kb-row'));
    const ri = rows.indexOf(row);
    const keys = Array.from(row.querySelectorAll('.key'));
    const ci = keys.indexOf(currentFocus);
    if (dir === 'left' && ci > 0) return focusElement(keys[ci-1]);
    if (dir === 'right' && ci < keys.length-1) return focusElement(keys[ci+1]);
    if (dir === 'up' && ri > 0) {
      const p = Array.from(rows[ri-1].querySelectorAll('.key'));
      return focusElement(p[Math.min(ci, p.length-1)]);
    }
    if (dir === 'down' && ri < rows.length-1) {
      const n = Array.from(rows[ri+1].querySelectorAll('.key'));
      return focusElement(n[Math.min(ci, n.length-1)]);
    }
    return;
  }

  if (menu) {
    const m = Array.from(menuOverlay.querySelectorAll('.focusable'));
    const i = m.indexOf(currentFocus);
    if (dir === 'up' && i > 0) return focusElement(m[i-1]);
    if (dir === 'down' && i < m.length-1) return focusElement(m[i+1]);
    return;
  }

  if (currentFocus.classList.contains('tab')) {
    const t = Array.from(document.querySelectorAll('#tabs.tab'));
    const i = t.indexOf(currentFocus);
    if (dir === 'left' && i > 0) return focusElement(t[i-1]);
    if (dir === 'right' && i < t.length-1) return focusElement(t[i+1]);
    if (dir === 'up') {
      const c = document.querySelectorAll('.screen.active.video-card');
      if (c.length) return focusElement(c[c.length-1]);
    }
    return;
  }

  if (currentFocus.classList.contains('video-card')) {
    const c = Array.from(document.querySelectorAll('.screen.active.video-card'));
    const i = c.indexOf(currentFocus);
    if (dir === 'left' && i % 2 === 1) return focusElement(c[i-1]);
    if (dir === 'right' && i % 2 === 0 && i+1 < c.length) return focusElement(c[i+1]);
    if (dir === 'up' && i >= 2) return focusElement(c[i-2]);
    if (dir === 'down') {
      if (i+2 < c.length) return focusElement(c[i+2]);
      return focusElement(document.querySelector('#tabs.tab.active'));
    }
    return;
  }
}

function setupNav() {
  document.addEventListener('keydown', e => {
    const k = e.key;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(k)) { e.preventDefault(); move(k.replace('Arrow','').toLowerCase()); }
    if (k === 'Enter' && currentFocus) currentFocus.click();
    if (k === 'Escape' || k === 'Backspace') {
      if (player.classList.contains('show')) { player.classList.remove('show'); playerFrame.innerHTML = ''; }
      else if (keyboard.classList.contains('show')) { keyboard.classList.remove('show'); }
      else if (menuOverlay.classList.contains('show')) closeMenu();
    }
  });
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => t.dataset.tab === 'menu'? openMenu() : switchTab(t.dataset.tab));
  document.querySelectorAll('[data-menu]').forEach(m => m.onclick = () => handleMenu(m.dataset.menu));
  searchBtn.onclick = () => { keyboard.classList.add('show'); setTimeout(() => focusElement(kbKeys.querySelector('.key')), 50); };
}

function switchTab(t) {
  if (t === 'menu') return;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  $(t).classList.add('active'); document.querySelector(`[data-tab="${t}"]`).classList.add('active');
  if (t === 'home' &&!homeGrid.children.length) loadHome();
}

async function search(p) {
  const u = new URL('https://www.googleapis.com/youtube/v3/search');
  Object.entries({part:'snippet', type:'video', key:API_KEY, maxResults:'20', regionCode:'US',...p}).forEach(([k,v]) => u.searchParams.set(k,v));
  try { return (await fetch(u)).json()).items || []; } catch { return []; }
}

function card(v) {
  const id = v.id.videoId; const d = document.createElement('div'); d.className = 'video-card focusable';
  d.innerHTML = `<div class="thumb"><img src="${v.snippet.thumbnails.medium.url}"></div><div class="info"><div class="title">${v.snippet.title}</div><div class="channel">${v.snippet.channelTitle}</div></div>`;
  d.onclick = () => { playerFrame.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1"></iframe>`; player.classList.add('show'); };
  return d;
}

async function loadHome() {
  homeGrid.innerHTML = '<div class="loading">Loading...</div>';
  const v = await search({q:'trending', order:'viewCount'});
  homeGrid.innerHTML = ''; v.slice(0,12).forEach(x => homeGrid.appendChild(card(x)));
  setTimeout(() => focusElement(homeGrid.querySelector('.video-card')), 300);
}

function buildKB() {
  const l = [['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M','⌫'],['BACK','SPACE','ENTER']];
  kbKeys.innerHTML = '';
  l.forEach(r => {
    const row = document.createElement('div'); row.className = 'kb-row';
    r.forEach(k => {
      const b = document.createElement('button'); b.className = 'key focusable' + (k.length>1?' wide':''); b.textContent = k==='SPACE'?'␣':k==='BACK'?'←':k==='ENTER'?'↵':k;
      b.onclick = () => {
        if (k==='⌫') kbDisplay.textContent = kbDisplay.textContent.slice(0,-1);
        else if (k==='SPACE') kbDisplay.textContent += ' ';
        else if (k==='ENTER') { keyboard.classList.remove('show'); if (kbDisplay.textContent) searchVideos(kbDisplay.textContent); }
        else if (k==='BACK') keyboard.classList.remove('show');
        else kbDisplay.textContent += k.toLowerCase();
      };
      row.appendChild(b);
    });
    kbKeys.appendChild(row);
  });
}

async function searchVideos(q) {
  searchGrid.innerHTML = '<div class="loading">Searching...</div>'; switchTab('search');
  const v = await search({q}); searchGrid.innerHTML = ''; v.forEach(x => searchGrid.appendChild(card(x)));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
