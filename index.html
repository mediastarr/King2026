<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:Arial;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:24px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 6px;font-size:10px;font-weight:bold;border-bottom:1px solid #333}
.header span:first-child{color:#0ff}
.search-display{background:#001418;padding:6px;text-align:center;border-bottom:2px solid #0ff;display:none}
.search-display.show{display:block}
.search-text{font-size:20px;color:#0ff;font-family:'Courier New',monospace;min-height:24px;font-weight:bold}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.grid{flex:1;overflow-y:auto;padding:3px;display:grid;grid-template-columns:1fr 1fr;gap:3px;align-content:start;background:#000}
.card{background:#111;border:2px solid #333;padding:2px}
.card:focus{border-color:#0ff;outline:none;background:#002020}
.card img{width:100%;height:58px;object-fit:cover;display:block}
.card-title{font-size:8px;height:16px;overflow:hidden;line-height:1.1;margin-top:1px}
.keyboard-area{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:10}
.keyboard-area.show{display:flex}
.kb-display{background:#001a1a;padding:8px;text-align:center;border-bottom:2px solid #0ff}
.kb-text{font-size:24px;color:#0ff;min-height:28px;font-weight:bold;font-family:'Courier New',monospace}
.kb-hint{font-size:9px;color:#0aa;margin-top:2px}
.kb-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;overflow-y:auto;background:#000;align-content:start}
.kb-key{background:#222;border:3px solid #555;color:#fff;font-size:20px;font-weight:bold;border-radius:5px;min-height:46px;display:flex;align-items:center;justify-content:center}
.kb-key:focus{background:#004444;border-color:#0ff;color:#0ff;outline:none;box-shadow:0 0 10px #0ff;transform:scale(1.05)}
.kb-key.wide{grid-column:span 2;font-size:15px}
.kb-key.enter{background:#003300;border-color:#0a0;color:#0f0}
.kb-key.enter:focus{background:#0a0;color:#000}
.kb-key.back{background:#330000;border-color:#a00;color:#faa}
.kb-key.back:focus{background:#a00;color:#fff}
.kb-key.space{grid-column:span 4;font-size:13px;background:#0a0a0a}
.tabs{display:flex;height:28px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#000;border:1px solid #333;color:#666;font-size:8px;font-weight:bold}
.tab.active{background:#002020;color:#0ff;border-color:#0ff}
.tab:focus{outline:1px solid #0ff}
.player{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:100}
.player.show{display:flex}
.player iframe{flex:1;border:0}
.controls{height:36px;background:#111;display:flex;gap:2px;padding:2px;border-top:1px solid #333}
.ctrl{flex:1;background:#222;border:none;color:#fff;font-size:13px;font-weight:bold;border-radius:3px}
.ctrl:active{background:#0ff;color:#000}
.ctrl.close{background:#500}
.loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#0ff;font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="header"><span>▶ STARRTUBE</span><span id="time"></span></div>
<div class="search-display" id="searchDisplay"><div class="search-text" id="searchText"></div></div>
<div class="content">
  <div class="grid" id="grid"></div>
  <div class="keyboard-area" id="kbArea">
    <div class="kb-display"><div class="kb-text" id="kbText">_</div><div class="kb-hint" id="kbHint">Arrows=move • ENTER=type</div></div>
    <div class="kb-grid" id="kbGrid"></div>
  </div>
</div>
<div class="player" id="player">
  <div class="loading" id="loading">Loading video...</div>
  <iframe id="frame" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
  <div class="controls">
    <button class="ctrl" id="rew">-10</button>
    <button class="ctrl" id="play">▶/❚❚</button>
    <button class="ctrl" id="fwd">+10</button>
    <button class="ctrl" id="full">⛶</button>
    <button class="ctrl close" id="close">✕</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active" tabindex="0">HOME</button>
  <button class="tab" tabindex="0">SEARCH</button>
  <button class="tab" tabindex="0">NEWS</button>
  <button class="tab" tabindex="0">SPORTS</button>
  <button class="tab" tabindex="0">MUSIC</button>
  <button class="tab" tabindex="0">LIVE</button>
</div>

<script>
const API_KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let ytPlayer=null, searchQuery='', lastTap=0, lastKey='', currentVideoId='';

setInterval(()=>document.getElementById('time').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),1000);

const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);

window.onYouTubeIframeAPIReady=function(){console.log('YT API Ready');};

const kbGrid=document.getElementById('kbGrid');
const kbText=document.getElementById('kbText');
const kbHint=document.getElementById('kbHint');

function updateKb(){kbText.textContent=searchQuery||'_';kbText.style.opacity=searchQuery?'1':'0.5';}

function createKey(char, display, wide=false, cls=''){
  const btn=document.createElement('button');btn.className='kb-key'+(wide?' wide':'')+(cls?' '+cls:'');btn.textContent=display||char;btn.type='button';btn.tabIndex=0;
  const action=()=>{const now=Date.now();if(char&&char===lastKey&&(now-lastTap)<280){kbHint.textContent='⚠ Blocked';setTimeout(updateKb,600);return;}lastKey=char;lastTap=now;if(char==='ENTER'){doSearch();return;}if(char==='BACK'){hideKeyboard();showHome();return;}if(char==='DEL'){searchQuery=searchQuery.slice(0,-1);}else if(char==='CLEAR'){searchQuery='';}else if(char){searchQuery+=char.toLowerCase();}updateKb();};
  btn.onclick=action;btn.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();action();}};kbGrid.appendChild(btn);return btn;
}

'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c=>createKey(c));
createKey(' ', 'SPACE', true, 'space');
createKey('DEL', 'DELETE', true);
createKey('CLEAR', 'CLEAR', true);
createKey('BACK', '← BACK', true, 'back');
createKey('ENTER', 'SEARCH ↵', true, 'enter');

function showKeyboard(){document.getElementById('kbArea').classList.add('show');document.getElementById('searchDisplay').classList.remove('show');searchQuery='';updateKb();setTimeout(()=>kbGrid.querySelector('button').focus(),50);}
function hideKeyboard(){document.getElementById('kbArea').classList.remove('show');}

async function loadVideos(q){
  const grid=document.getElementById('grid');grid.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:#555;font-size:10px">Loading...</div>';hideKeyboard();
  try{const res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&key=${API_KEY}&maxResults=20&regionCode=US&videoEmbeddable=true&q=${encodeURIComponent(q)}`);const data=await res.json();grid.innerHTML='';data.items.forEach(v=>{const c=document.createElement('div');c.className='card';c.tabIndex=0;c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div class="card-title">${v.snippet.title}</div>`;c.onclick=()=>playVideo(v.id.videoId);c.onkeydown=e=>{if(e.key==='Enter')playVideo(v.id.videoId);};grid.appendChild(c);});grid.firstChild?.focus();}catch(e){grid.innerHTML='<div style="color:#f66;padding:20px">Error</div>';}
}

function playVideo(videoId){
  currentVideoId=videoId;
  const player=document.getElementById('player');
  const loading=document.getElementById('loading');
  const frame=document.getElementById('frame');

  player.classList.add('show');
  loading.style.display='block';
  loading.textContent='Loading video...';

  // Destroy old player
  if(ytPlayer){try{ytPlayer.destroy();}catch(e){} ytPlayer=null;}

  // Wait for API
  const initPlayer=()=>{
    if(typeof YT==='undefined'||!YT.Player){setTimeout(initPlayer,100);return;}

    ytPlayer=new YT.Player('frame',{
      videoId:videoId,
      playerVars:{
        autoplay:1,
        controls:0,
        modestbranding:1,
        playsinline:1,
        rel:0,
        enablejsapi:1,
        origin:window.location.origin,
        iv_load_policy:3
      },
      events:{
        onReady:(e)=>{
          loading.style.display='none';
          console.log('Player ready');
          try{e.target.playVideo();}catch(err){console.log('Play error:',err);}
        },
        onStateChange:(e)=>{
          const playBtn=document.getElementById('play');
          if(e.data===1){playBtn.textContent='❚❚';loading.style.display='none';}
          else if(e.data===2){playBtn.textContent='▶';}
          else if(e.data===0){playBtn.textContent='▶';}
        },
        onError:(e)=>{
          loading.textContent='Error loading video (Code:'+e.data+')';
          console.log('YT Error:',e.data);
        }
      }
    });
  };

  initPlayer();

  document.getElementById('play').onclick=()=>{if(!ytPlayer)return;ytPlayer.getPlayerState()===1?ytPlayer.pauseVideo():ytPlayer.playVideo();};
  document.getElementById('rew').onclick=()=>{if(!ytPlayer)return;ytPlayer.seekTo(Math.max(0,ytPlayer.getCurrentTime()-10),true);};
  document.getElementById('fwd').onclick=()=>{if(!ytPlayer)return;ytPlayer.seekTo(ytPlayer.getCurrentTime()+10,true);};
  document.getElementById('close').onclick=()=>{player.classList.remove('show');if(ytPlayer){try{ytPlayer.stopVideo();ytPlayer.destroy();}catch(e){}ytPlayer=null;}};
  document.getElementById('full').onclick=()=>document.fullscreenElement?document.exitFullscreen():player.requestFullscreen();
}

function doSearch(){const q=searchQuery.trim();if(!q){kbHint.textContent='Type first!';setTimeout(updateKb,800);return;}document.getElementById('searchText').textContent=q;document.getElementById('searchDisplay').classList.add('show');hideKeyboard();loadVideos(q);searchQuery='';}
function showHome(){document.getElementById('searchDisplay').classList.remove('show');loadVideos('trending');}

document.querySelectorAll('.tab').forEach((t,i)=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const qs=['trending','','news','sports','music','live'];if(i===1)showKeyboard();else{hideKeyboard();document.getElementById('searchDisplay').classList.remove('show');loadVideos(qs[i]);}};});

document.addEventListener('keydown',e=>{
  if(document.getElementById('player').classList.contains('show')){if(e.key==='Escape'){e.preventDefault();document.getElementById('close').click();}return;}
  const f=document.activeElement;const isKb=f.classList.contains('kb-key');const isCard=f.classList.contains('card');const isTab=f.classList.contains('tab');
  if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return;
  if(isKb){e.preventDefault();const keys=[...kbGrid.querySelectorAll('button')];const idx=keys.indexOf(f);const cols=4;let next=null;if(e.key==='ArrowRight'&&keys[idx+1])next=keys[idx+1];else if(e.key==='ArrowLeft'&&idx>0)next=keys[idx-1];else if(e.key==='ArrowDown'&&keys[idx+cols])next=keys[idx+cols];else if(e.key==='ArrowUp'&&keys[idx-cols])next=keys[idx-cols];if(next)next.focus();return;}
  if(isCard||isTab){e.preventDefault();const cards=[...document.getElementById('grid').querySelectorAll('.card')];const tabs=[...document.querySelectorAll('.tab')];const ci=cards.indexOf(f),ti=tabs.indexOf(f);if(e.key==='ArrowRight'){if(ci>=0&&ci%2===0&&cards[ci+1])cards[ci+1].focus();else if(ti>=0&&ti<5)tabs[ti+1].focus();}if(e.key==='ArrowLeft'){if(ci>=0&&ci%2===1)cards[ci-1].focus();else if(ti>0)tabs[ti-1].focus();}if(e.key==='ArrowDown'){if(ci>=0&&cards[ci+2])cards[ci+2].focus();else if(ci>=0)tabs[0].focus();else if(ti>=0)cards[0]?.focus();}if(e.key==='ArrowUp'&&ci>=2)cards[ci-2].focus();}
});

showHome();updateKb();
</script>
</body>
</html>
