<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StarrTube – YouTube for Meta Ray-Ban Display</title>
<meta name="viewport" content="width=600, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
:root {
  --bg:#000000; --text:#FFFFFF; --accent:#00FFFF; --secondary:#888888;
  --card:#111111; --border:#333333;
}
body.high-contrast {
  --bg:#FFFFFF; --text:#000000; --card:#EEEEEE; --border:#999999; --secondary:#555555;
}
* { box-sizing:border-box; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale }
html,body { margin:0; padding:0; height:100%; background:#1a1a1a; overflow:hidden; font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
body { display:flex; align-items:center; justify-content:center; }
#app {
  width:600px; height:600px; background:var(--bg); color:var(--text);
  position:relative; overflow:hidden; display:flex; flex-direction:column;
  user-select:none; touch-action:none; border:1px solid #222;
}
#header {
  height:60px; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:18px; }
.logo-yt { width:28px; height:20px; background:#FF0000; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; font-weight:900; }
#clock { font-variant-numeric:tabular-nums; color:var(--secondary); font-size:14px; font-weight:500; }
#content { height:480px; position:relative; flex-shrink:0; }
.screen { position:absolute; inset:0; display:none; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.screen.active { display:block; }
.screen::-webkit-scrollbar { display:none; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px; }
.video-card { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.thumb-wrap { width:100%; aspect-ratio:16/9; background:#000; position:relative; }
.thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.info { padding:8px 8px 10px; }
.title { font-size:13px; font-weight:700; line-height:1.25; height:2.5em; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.channel { font-size:11px; color:var(--secondary); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

#tabs { height:60px; display:flex; border-top:1px solid var(--border); background:var(--bg); flex-shrink:0; }
.tab-btn { flex:1; background:none; border:none; color:var(--secondary); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:11px; font-weight:600; padding:0; }
.tab-btn.active { color:var(--accent); }
.tab-icon { font-size:20px; line-height:1; }

.focusable { outline:none; }
.focusable.focused { outline:2px solid var(--accent); outline-offset:-2px; box-shadow:0 0 0 2px var(--bg), 0 0 14px var(--accent); z-index:10; }
.video-card.focused { transform:scale(1.03); border-color:var(--accent); }
.tab-btn.focused { background:rgba(0,255,255,0.08); }

.loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--secondary); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:80px 20px; color:var(--secondary); font-size:14px; }

#search.search-bar { margin:12px; padding:16px; background:var(--card); border:1px solid var(--border); border-radius:10px; display:flex; align-items:center; justify-content:space-between; font-size:15px; font-weight:600; }
#search.placeholder { color:var(--secondary); }
#search.search-query { color:var(--accent); max-width:70%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

.overlay { position:absolute; left:0; width:600px; background:var(--bg); z-index:30; display:none; flex-direction:column; }
.overlay.show { display:flex; }
#keyboard, #menuOverlay { top:60px; height:540px; border-top:1px solid var(--border); }
#player { top:0; height:600px; z-index:50; background:#000; }

.keyboard-display { height:70px; padding:0 20px; display:flex; align-items:center; border-bottom:1px solid var(--border); font-size:22px; color:var(--accent); letter-spacing:0.5px; overflow:hidden; }
.keyboard-keys { flex:1; display:flex; flex-direction:column; justify-content:center; gap:10px; padding:16px; }
.kb-row { display:flex; gap:8px; justify-content:center; }
.key { min-width:50px; height:52px; background:var(--card); border:1px solid var(--border); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:var(--text); }
.key.wide { min-width:76px; }
.key.extra-wide { min-width:112px; font-size:14px; }
.key.focused { background:var(--accent); color:#000; border-color:var(--accent); }

#menuOverlay.menu-list { padding:30px 24px; display:flex; flex-direction:column; gap:14px; justify-content:center; height:100%; }
.menu-item { padding:20px 22px; background:var(--card); border:1px solid var(--border); border-radius:12px; font-size:17px; font-weight:700; display:flex; align-items:center; justify-content:space-between; color:var(--text); }
.menu-item.focused { background:var(--accent); color:#000; border-color:var(--accent); }

#playerFrameWrap { position:absolute; inset:0; background:#000; }
#playerFrameWrap iframe { width:100%; height:100%; border:0; }
#playerControls { position:absolute; bottom:0; left:0; right:0; height:90px; background:linear-gradient(to top, rgba(0,0,0,0.95), transparent); display:flex; align-items:center; justify-content:space-evenly; padding:0 20px; transition:opacity 0.3s; }
#playerControls.hidden { opacity:0; pointer-events:none; }
.ctrl-btn { width:56px; height:56px; border-radius:50%; background:rgba(20,20,20,0.9); border:1px solid var(--border); color:var(--text); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; }
.ctrl-btn.big { width:70px; height:70px; font-size:30px; }
.ctrl-btn.focused { background:var(--accent); color:#000; border-color:var(--accent); transform:scale(1.08); }
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo"><div class="logo-yt">▶</div><span id="headerTitle">StarrTube</span></div>
    <div id="clock">00:00</div>
  </header>

  <main id="content">
    <section id="home" class="screen active scroll-area"><div class="grid" id="homeGrid"></div></section>

    <section id="search" class="screen scroll-area">
      <div class="search-bar focusable" id="searchBar" tabindex="-1">
        <span id="searchPlaceholder" class="placeholder">Search YouTube</span>
        <span id="searchQueryDisplay" class="search-query"></span>
      </div>
      <div class="grid" id="searchGrid"></div>
      <div class="empty" id="searchEmpty">Press Enter to search</div>
    </section>

    <section id="shorts" class="screen scroll-area"><div class="grid" id="shortsGrid"></div></section>

    <section id="history" class="screen scroll-area"><div class="grid" id="historyGrid"></div></section>
  </main>

  <footer id="tabs">
    <button class="tab-btn focusable active" data-tab="home" id="tab-home" tabindex="-1"><div class="tab-icon">⌂</div><div>Home</div></button>
    <button class="tab-btn focusable" data-tab="search" id="tab-search" tabindex="-1"><div class="tab-icon">⌕</div><div>Search</div></button>
    <button class="tab-btn focusable" data-tab="shorts" id="tab-shorts" tabindex="-1"><div class="tab-icon">◫</div><div>Shorts</div></button>
    <button class="tab-btn focusable" data-tab="history" id="tab-history" tabindex="-1"><div class="tab-icon">↻</div><div>History</div></button>
    <button class="tab-btn focusable" data-tab="menu" id="tab-menu" tabindex="-1"><div class="tab-icon">⋮</div><div>Menu</div></button>
  </footer>

  <div id="keyboard" class="overlay">
    <div class="keyboard-display" id="kbDisplay"></div>
    <div class="keyboard-keys" id="kbKeys"></div>
  </div>

  <div id="menuOverlay" class="overlay">
    <div class="menu-list">
      <button class="menu-item focusable" data-menu="home" tabindex="-1">Home <span>⌂</span></button>
      <button class="menu-item focusable" data-menu="contrast" tabindex="-1">Contrast <span>◐</span></button>
      <button class="menu-item focusable" data-menu="back" tabindex="-1">Go back <span>←</span></button>
      <button class="menu-item focusable" data-menu="live" tabindex="-1">Live <span>●</span></button>
      <button class="menu-item focusable" data-menu="close" tabindex="-1">Close <span>✕</span></button>
    </div>
  </div>

  <div id="player" class="overlay">
    <div id="playerFrameWrap"><div id="ytplayer"></div></div>
    <div id="playerControls">
      <button class="ctrl-btn focusable" data-action="back" tabindex="-1">←</button>
      <button class="ctrl-btn focusable" data-action="rew" tabindex="-1">↞</button>
      <button class="ctrl-btn focusable big" data-action="play" tabindex="-1">⏸</button>
      <button class="ctrl-btn focusable" data-action="fwd" tabindex="-1">↠</button>
      <button class="ctrl-btn focusable" data-action="fs" tabindex="-1">⛶</button>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const API_KEY = 'AIzaSyBWMwaHZgdhuGRM1iZvE9suCwbuyIfyH1g';
let currentTab = 'home', previousTab = 'home', lastFocusByScreen = {}, shortsLoaded = false, returnFocus = null, ytPlayer = null, controlsTimer = null, lastQuery = '', ytReady = false;

function onYouTubeIframeAPIReady(){ ytReady = true; }
function updateClock(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

function getActiveLayer(){
  const p=document.getElementById('player'); if(p.classList.contains('show')) return p;
  const k=document.getElementById('keyboard'); if(k.classList.contains('show')) return k;
  const m=document.getElementById('menuOverlay'); if(m.classList.contains('show')) return m;
  return document.getElementById('app');
}
function getFocusables(){
  const layer=getActiveLayer();
  return Array.from(layer.querySelectorAll('.focusable')).filter(el=>{
    const s=window.getComputedStyle(el); return s.display!=='none' && s.visibility!=='hidden' && el.offsetParent!==null;
  });
}
function setFocus(el){
  if(!el) return;
  const prev=document.querySelector('.focusable.focused'); if(prev) prev.classList.remove('focused');
  el.classList.add('focused');
  try{ el.focus({preventScroll:true}); }catch(e){}
  const scrollParent=el.closest('.scroll-area');
  if(scrollParent){ const r=el.getBoundingClientRect(), pr=scrollParent.getBoundingClientRect(); if(r.top<pr.top+20 || r.bottom>pr.bottom-20) el.scrollIntoView({block:'nearest', behavior:'smooth'}); }
  if(currentTab) lastFocusByScreen[currentTab]=el;
}
function moveFocus(dir){
  const items=getFocusables(); if(!items.length) return;
  let cur=document.querySelector('.focusable.focused'); if(!items.includes(cur)) cur=items[0];
  const cr=cur.getBoundingClientRect(), cx=cr.left+cr.width/2, cy=cr.top+cr.height/2;
  let best=null, bestScore=Infinity;
  for(const el of items){ if(el===cur) continue; const r=el.getBoundingClientRect(), ex=r.left+r.width/2, ey=r.top+r.height/2; let ok=false, primary=0, secondary=0;
    if(dir==='up' && ey<cy-5){ ok=true; primary=cy-ey; secondary=Math.abs(ex-cx); if(r.right<cr.left||r.left>cr.right) secondary+=1000; }
    if(dir==='down' && ey>cy+5){ ok=true; primary=ey-cy; secondary=Math.abs(ex-cx); if(r.right<cr.left||r.left>cr.right) secondary+=1000; }
    if(dir==='left' && ex<cx-5){ ok=true; primary=cx-ex; secondary=Math.abs(ey-cy); if(r.bottom<cr.top||r.top>cr.bottom) secondary+=1000; }
    if(dir==='right' && ex>cx+5){ ok=true; primary=ex-cx; secondary=Math.abs(ey-cy); if(r.bottom<cr.top||r.top>cr.bottom) secondary+=1000; }
    if(ok){ const score=primary*1000+secondary; if(score<bestScore){ bestScore=score; best=el; } }
  }
  if(!best){ let wrap=-Infinity; for(const el of items){ if(el===cur) continue; const r=el.getBoundingClientRect(); const score=dir==='up'?r.top:dir==='down'?-r.top:dir==='left'?r.left:-r.left; if(score>wrap){wrap=score;best=el;} } }
  if(best) setFocus(best);
}
function activateFocus(){ const el=document.querySelector('.focusable.focused'); if(el) el.click(); }
function handleBack(){
  if(document.getElementById('player').classList.contains('show')){ closePlayer(); return true; }
  if(document.getElementById('keyboard').classList.contains('show')){ hideKeyboard(); return true; }
  if(document.getElementById('menuOverlay').classList.contains('show')){ closeMenu(); return true; }
  return false;
}

async function ytSearch(opts={}){
  try{
    const base={part:'snippet',type:'video',key:API_KEY,regionCode:'US',maxResults:20,safeSearch:'moderate'};
    const params=new URLSearchParams({...base,...opts});
    const res=await fetch(`https://www.googleapis.com/youtube/v3/search?${params}`);
    const data=await res.json();
    return res.ok?data:{items:[]};
  }catch(e){ return {items:[]}; }
}
function mapVideo(item){ return {
  videoId:item.id?.videoId||item.videoId,
  title:item.snippet.title,
  channel:item.snippet.channelTitle,
  thumbnail:item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
  watchedAt:item.watchedAt||Date.now()
};}
function renderGrid(container, videos){
  container.innerHTML='';
  if(!videos.length){ container.innerHTML='<div class="empty">No videos found</div>'; return; }
  videos.forEach((v,i)=>{
    const card=document.createElement('div'); card.className='video-card focusable'; card.tabIndex=-1; card.dataset.videoid=v.videoId;
    card.innerHTML=`<div class="thumb-wrap"><img src="${v.thumbnail}" alt="" loading="lazy"></div><div class="info"><div class="title">${v.title}</div><div class="channel">${v.channel}</div></div>`;
    card.addEventListener('click',()=>openPlayer(v));
    container.appendChild(card);
  });
}

async function loadHome(){
  const grid=document.getElementById('homeGrid'); grid.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const cats=[{q:'US animation',max:3},{q:'free movies full length',max:3},{q:'world news live',max:3},{q:'stand up comedy',max:3},{q:'sports highlights',max:3},{q:'educational documentaries',max:3},{q:'viral videos',max:2}];
  let all=[];
  for(const c of cats){ const data=await ytSearch({q:c.q,maxResults:c.max}); if(data.items) all=all.concat(data.items.map(mapVideo)); }
  renderGrid(grid, all.slice(0,20));
  setTimeout(()=>{ const f=grid.querySelector('.focusable'); if(f) setFocus(f); },150);
}
async function loadShorts(){
  const grid=document.getElementById('shortsGrid'); grid.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const data=await ytSearch({q:'shorts',videoDuration:'short',maxResults:20,order:'date'});
  renderGrid(grid, (data.items||[]).map(mapVideo));
}
async function loadLive(){
  const grid=document.getElementById('homeGrid'); grid.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const data=await ytSearch({eventType:'live',q:'live',maxResults:20,order:'viewCount'});
  renderGrid(grid, (data.items||[]).map(mapVideo));
  switchTab('home');
}
function loadHistory(){
  const grid=document.getElementById('historyGrid');
  try{ const h=JSON.parse(localStorage.getItem('starrtube_history')||'[]'); if(!h.length){ grid.innerHTML='<div class="empty">No history yet</div>'; return; } renderGrid(grid, h); }
  catch(e){ grid.innerHTML='<div class="empty">No history</div>'; }
}
function addToHistory(v){
  try{ const h=JSON.parse(localStorage.getItem('starrtube_history')||'[]'); const f=h.filter(x=>x.videoId!==v.videoId); f.unshift(v); localStorage.setItem('starrtube_history', JSON.stringify(f.slice(0,50))); }catch(e){}
}

function doSearch(q){
  lastQuery=q; localStorage.setItem('lastSearch',q);
  document.getElementById('searchQueryDisplay').textContent=q;
  document.getElementById('searchPlaceholder').style.display=q?'none':'block';
  document.getElementById('searchEmpty').style.display='none';
  const grid=document.getElementById('searchGrid'); grid.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  ytSearch({q,maxResults:20}).then(data=>{ renderGrid(grid,(data.items||[]).map(mapVideo)); setTimeout(()=>{ const f=grid.querySelector('.focusable'); if(f) setFocus(f); },100); });
}

function buildKeyboard(){
  const layout=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M','⌫'],['SPACE','ENTER','CANCEL']];
  const wrap=document.getElementById('kbKeys'); wrap.innerHTML='';
  layout.forEach(row=>{ const r=document.createElement('div'); r.className='kb-row'; row.forEach(k=>{ const b=document.createElement('button'); b.className='key focusable'; if(k==='SPACE'||k==='ENTER'||k==='CANCEL') b.classList.add('extra-wide'); if(k==='⌫') b.classList.add('wide'); b.textContent=k; b.dataset.key=k; b.tabIndex=-1; b.addEventListener('click',()=>handleKey(k)); r.appendChild(b); }); wrap.appendChild(r); });
}
function showKeyboard(){ const kb=document.getElementById('keyboard'); kb.classList.add('show'); document.getElementById('kbDisplay').textContent=lastQuery; setTimeout(()=>setFocus(kb.querySelector('.key')),100); }
function hideKeyboard(){ document.getElementById('keyboard').classList.remove('show'); setFocus(document.getElementById('searchBar')); }
function handleKey(k){ const d=document.getElementById('kbDisplay'); let q=d.textContent||''; if(k==='⌫') q=q.slice(0,-1); else if(k==='SPACE') q+=' '; else if(k==='ENTER'){ hideKeyboard(); if(q.trim()) doSearch(q.trim()); return; } else if(k==='CANCEL'){ hideKeyboard(); return; } else q+=k.toLowerCase(); d.textContent=q; }

function openPlayer(v){
  returnFocus=document.querySelector('.focusable.focused');
  const p=document.getElementById('player'); p.classList.add('show'); addToHistory(v);
  if(ytPlayer&&ytPlayer.destroy) try{ytPlayer.destroy();}catch(e){}
  const create=()=>{ ytPlayer=new YT.Player('ytplayer',{videoId:v.videoId,playerVars:{autoplay:1,controls:0,modestbranding:1,rel:0,playsinline:1,enablejsapi:1},events:{onReady:e=>e.target.playVideo()}}); };
  if(ytReady) create(); else { const chk=setInterval(()=>{ if(ytReady){ clearInterval(chk); create(); } },200); }
  showControls(); setTimeout(()=>setFocus(document.querySelector('[data-action="play"]')),300);
}
function closePlayer(){ const p=document.getElementById('player'); p.classList.remove('show'); if(ytPlayer&&ytPlayer.stopVideo) ytPlayer.stopVideo(); document.getElementById('playerFrameWrap').innerHTML='<div id="ytplayer"></div>'; if(returnFocus) setTimeout(()=>setFocus(returnFocus),100); }
function showControls(){ const c=document.getElementById('playerControls'); c.classList.remove('hidden'); clearTimeout(controlsTimer); controlsTimer=setTimeout(()=>c.classList.add('hidden'),3000); }
function togglePlay(){ if(!ytPlayer) return; const btn=document.querySelector('[data-action="play"]'); const st=ytPlayer.getPlayerState(); if(st===1){ ytPlayer.pauseVideo(); btn.textContent='▶'; } else { ytPlayer.playVideo(); btn.textContent='⏸'; } }
function handleControl(a){ if(a==='back') closePlayer(); else if(a==='rew'&&ytPlayer) ytPlayer.seekTo(Math.max(0,ytPlayer.getCurrentTime()-10),true); else if(a==='fwd'&&ytPlayer) ytPlayer.seekTo(ytPlayer.getCurrentTime()+10,true); else if(a==='play') togglePlay(); else if(a==='fs') document.getElementById('playerControls').classList.toggle('hidden'); showControls(); }

function openMenu(){ previousTab=currentTab; const m=document.getElementById('menuOverlay'); m.classList.add('show'); document.getElementById('headerTitle').textContent='For YouTube'; setTimeout(()=>setFocus(m.querySelector('.focusable')),100); }
function closeMenu(){ document.getElementById('menuOverlay').classList.remove('show'); document.getElementById('headerTitle').textContent='StarrTube'; setTimeout(()=>setFocus(document.getElementById('tab-'+currentTab)),50); }
function handleMenu(a){ if(a==='home'){ closeMenu(); switchTab('home'); } else if(a==='contrast'){ toggleContrast(); } else if(a==='back'){ closeMenu(); switchTab(previousTab); } else if(a==='live'){ closeMenu(); loadLive(); } else if(a==='close'){ closeMenu(); } }

function toggleContrast(){ document.body.classList.toggle('high-contrast'); localStorage.setItem('contrast', document.body.classList.contains('high-contrast')?'1':'0'); }

function switchTab(name){
  if(name==='menu'){ openMenu(); return; }
  currentTab=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  const titles={home:'StarrTube',search:'Search',shorts:'Shorts',history:'History'};
  document.getElementById('headerTitle').textContent=titles[name]||'StarrTube';
  if(name==='shorts' &&!shortsLoaded){ shortsLoaded=true; loadShorts(); }
  if(name==='history') loadHistory();
  if(name==='home' &&!document.getElementById('homeGrid').children.length) loadHome();
  setTimeout(()=>{ const last=lastFocusByScreen[name]; setFocus(last || document.querySelector(`#${name}.focusable`) || document.getElementById('tab-'+name)); },80);
}

function init(){
  document.querySelectorAll('.focusable').forEach(el=>el.tabIndex=-1);
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.getElementById('searchBar').addEventListener('click',showKeyboard);
  document.querySelectorAll('[data-menu]').forEach(m=>m.addEventListener('click',()=>handleMenu(m.dataset.menu)));
  document.querySelectorAll('#playerControls.ctrl-btn').forEach(b=>b.addEventListener('click',()=>handleControl(b.dataset.action)));
  buildKeyboard();
  lastQuery=localStorage.getItem('lastSearch')||''; document.getElementById('searchQueryDisplay').textContent=lastQuery; if(lastQuery) document.getElementById('searchPlaceholder').style.display='none';
  if(localStorage.getItem('contrast')==='1') document.body.classList.add('high-contrast');
  updateClock(); setInterval(updateClock,1000);
  switchTab('home'); loadHome();
  setTimeout(()=>setFocus(document.getElementById('tab-home')),200);

  window.addEventListener('keydown',e=>{
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(e.key)) e.preventDefault();
    if(document.getElementById('player').classList.contains('show')) showControls();
    switch(e.key){
      case 'ArrowUp': moveFocus('up'); break;
      case 'ArrowDown': moveFocus('down'); break;
      case 'ArrowLeft': moveFocus('left'); break;
      case 'ArrowRight': moveFocus('right'); break;
      case 'Enter': case ' ': activateFocus(); break;
      case 'Backspace': case 'Escape': handleBack(); break;
    }
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
