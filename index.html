<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#0ff;font-family:monospace;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.top{height:30px;background:#111;display:flex;align-items:center;padding:0 10px;font-size:14px;font-weight:bold;border-bottom:3px solid #0ff}
.display{background:#001a1a;padding:15px;text-align:center;border-bottom:3px solid #0ff}
.display-text{font-size:32px;color:#0ff;min-height:40px;font-weight:bold}
.display-hint{font-size:12px;color:#0aa;margin-top:5px}
.keyboard{flex:1;background:#000;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:5px;overflow:auto}
.key{background:#222;border:3px solid #555;color:#fff;font-size:24px;font-weight:bold;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:60px}
.key:focus{background:#0ff;color:#000;border-color:#0ff;outline:none;box-shadow:0 0 15px #0ff}
.key:active{background:#0aa}
.key.big{grid-column:span 2;font-size:18px}
.key.enter{background:#004400;border-color:#0f0;color:#0f0;font-size:20px}
.key.enter:focus{background:#0f0;color:#000}
.key.back{background:#440000;border-color:#f00;color:#f88;font-size:20px}
.key.back:focus{background:#f00;color:#fff}
.test-area{padding:10px;background:#111;text-align:center}
.test-btn{background:#0ff;color:#000;border:none;padding:15px 30px;font-size:18px;font-weight:bold;border-radius:5px;margin:5px}
</style>
</head>
<body>
<div class="top">KEYBOARD TEST - TAP BUTTONS BELOW</div>

<div class="display">
  <div class="display-text" id="out">READY</div>
  <div class="display-hint" id="hint">Tap a letter to test</div>
</div>

<div class="keyboard" id="kb"></div>

<div class="test-area">
  <button class="test-btn" onclick="testNav()">TEST NAVIGATION</button>
</div>

<script>
let text = '';

function updateDisplay(msg, hint='') {
  document.getElementById('out').textContent = msg;
  document.getElementById('hint').textContent = hint;
  console.log('Display:', msg);
}

// Create simple test keyboard
const kb = document.getElementById('kb');
const letters = 'ABCDEFGH';

letters.split('').forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.textContent = l;
  btn.tabIndex = 0;
  btn.onclick = function() {
    text += l;
    updateDisplay(text, 'Letter ' + l + ' pressed!');
    // Visual feedback
    btn.style.background = '#0ff';
    setTimeout(() => btn.style.background = '', 200);
  };
  // Make sure focus works
  btn.onfocus = function() {
    updateDisplay(text || 'READY', 'Focused on ' + l + ' - Press ENTER');
  };
  kb.appendChild(btn);
});

// Add ENTER button - VERY VISIBLE
const enterBtn = document.createElement('button');
enterBtn.className = 'key big enter';
enterBtn.textContent = 'ENTER ↵';
enterBtn.tabIndex = 0;
enterBtn.onclick = function() {
  updateDisplay('ENTER PRESSED!', 'You pressed ENTER - Text: ' + text);
  alert('ENTER WORKS! Your text: ' + text);
};
enterBtn.onfocus = function() {
  updateDisplay(text || 'READY', 'Focused on ENTER - Press to submit');
};
kb.appendChild(enterBtn);

// Add BACK button - VERY VISIBLE
const backBtn = document.createElement('button');
backBtn.className = 'key big back';
backBtn.textContent = '← BACK';
backBtn.tabIndex = 0;
backBtn.onclick = function() {
  updateDisplay('BACK PRESSED!', 'You pressed BACK');
  alert('BACK WORKS!');
  text = '';
  updateDisplay('CLEARED', 'Text cleared');
};
backBtn.onfocus = function() {
  updateDisplay(text || 'READY', 'Focused on BACK - Press to cancel');
};
kb.appendChild(backBtn);

// Add more letters
'IJKL'.split('').forEach(l => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.textContent = l;
  btn.tabIndex = 0;
  btn.onclick = function() {
    text += l;
    updateDisplay(text, 'Letter ' + l);
  };
  btn.onfocus = function() {
    updateDisplay(text || 'READY', 'On ' + l);
  };
  kb.appendChild(btn);
});

function testNav() {
  updateDisplay('TEST MODE', 'Use arrows to move, ENTER to select');
  setTimeout(() => {
    kb.querySelector('button').focus();
  }, 100);
}

// Auto-focus first button
setTimeout(() => {
  updateDisplay('READY TO TEST', 'Tap TEST NAVIGATION button or use arrows');
}, 500);

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  const focused = document.activeElement;
  if(!focused.classList.contains('key')) return;
  
  const keys = [...kb.querySelectorAll('.key')];
  const idx = keys.indexOf(focused);
  const cols = 4;
  
  if(['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
  }
  
  if(e.key === 'ArrowRight' && keys[idx+1]) {
    keys[idx+1].focus();
  } else if(e.key === 'ArrowLeft' && idx > 0) {
    keys[idx-1].focus();
  } else if(e.key === 'ArrowDown' && keys[idx+cols]) {
    keys[idx+cols].focus();
  } else if(e.key === 'ArrowUp' && keys[idx-cols]) {
    keys[idx-cols].focus();
  } else if(e.key === 'Enter') {
    focused.click();
  }
});

updateDisplay('READY', 'Press TEST NAVIGATION to start');
</script>
</body>
</html>
