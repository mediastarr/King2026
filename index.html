<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StarrTube – Meta Ray-Ban Display</title>
<meta name="viewport" content="width=600, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
:root {
  --bg:#000000; --text:#FFFFFF; --accent:#00FFFF; --secondary:#888888;
  --card:#111111; --border:#333333;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; background:#000; overflow:hidden; font-family:system-ui,-apple-system,sans-serif; }
body { display:flex; align-items:center; justify-content:center; background:#1a1a1a; }
#app {
  width:600px; height:600px; background:var(--bg); color:var(--text);
  position:relative; overflow:hidden; display:flex; flex-direction:column;
}
#header { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--border); }
.logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:18px; }
.logo-yt { width:28px; height:20px; background:#FF0000; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; }
#clock { color:var(--secondary); font-size:14px; font-variant-numeric:tabular-nums; }
#content { height:480px; position:relative; overflow:hidden; }
.screen { position:absolute; inset:0; display:none; overflow-y:auto; }
.screen.active { display:block; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
.video-card { background:var(--card); border:2px solid transparent; border-radius:8px; overflow:hidden; }
.video-card.focused { border-color:var(--accent); transform:scale(1.02); }
.thumb { width:100%; aspect-ratio:16/9; background:#000; position:relative; }
.thumb img { width:100%; height:100%; object-fit:cover; }
.info { padding:8px; }
.title { font-size:13px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; height:34px; }
.channel { font-size:11px; color:var(--secondary); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#tabs { height:60px; display:flex; border-top:1px solid var(--border); }
.tab { flex:1; background:none; border:none; color:var(--secondary); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; font-size:11px; }
.tab.active { color:var(--accent); }
.tab.focused { background:rgba(0,255,255,0.1); }
.tab-icon { font-size:22px; }
.focusable { outline:none; }
.focusable.focused { outline:2px solid var(--accent); outline-offset:-2px; }
#keyboard { position:absolute; inset:60px 0 0 0; background:var(--bg); display:none; flex-direction:column; z-index:100; }
#keyboard.show { display:flex; }
.kb-display { height:60px; padding:0 16px; display:flex; align-items:center; font-size:20px; color:var(--accent); border-bottom:1px solid var(--border); }
.kb-keys { flex:1; display:flex; flex-direction:column; justify-content:center; padding:12px; gap:8px; }
.kb-row { display:flex; gap:6px; justify-content:center; }
.key { width:52px; height:48px; background:var(--card); border:1px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600; }
.key.wide { width:80px; }
.key.focused { background:var(--accent); color:#000; border-color:var(--accent); }
#player { position:absolute; inset:0; background:#000; display:none; z-index:200; }
#player.show { display:block; }
#player iframe { width:100%; height:100%; border:0; }
#player-ui { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(transparent, rgba(0,0,0,0.9)); display:flex; align-items:center; justify-content:center; gap:20px; }
.ctrl { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:20px; display:flex; align-items:center; justify-content:center; }
.ctrl.focused { background:var(--accent); color:#000; }
.loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--secondary); }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo"><div class="logo-yt">▶</div><span>StarrTube</span></div>
    <div id="clock">00:00</div>
  </div>
  
  <div id="content">
    <div id="home" class="screen active">
      <div class="grid" id="homeGrid"></div>
    </div>
    <div id="search" class="screen">
      <div style="padding:12px;">
        <div class="video-card focusable" id="searchBtn" style="padding:16px; text-align:center;">Search YouTube</div>
      </div>
      <div class="grid" id="searchGrid"></div>
    </div>
    <div id="shorts" class="screen">
      <div class="grid" id="shortsGrid"></div>
    </div>
    <div id="history" class="screen">
      <div class="grid" id="historyGrid"></div>
    </div>
  </div>
  
  <div id="tabs">
    <button class="tab focusable active" data-tab="home"><div class="tab-icon">⌂</div><div>Home</div></button>
    <button class="tab focusable" data-tab="search"><div class="tab-icon">⌕</div><div>Search</div></button>
    <button class="tab focusable" data-tab="shorts"><div class="tab-icon">◫</div><div>Shorts</div></button>
    <button class="tab focusable" data-tab="history"><div class="tab-icon">↻</div><div>History</div></button>
    <button class="tab focusable" data-tab="menu"><div class="tab-icon">⋮</div><div>Menu</div></button>
  </div>
  
  <div id="keyboard">
    <div class="kb-display" id="kbDisplay"></div>
    <div class="kb-keys" id="kbKeys"></div>
  </div>
  
  <div id="player">
    <div id="playerFrame"></div>
    <div id="player-ui">
      <button class="ctrl focusable" data-act="back">←</button>
      <button class="ctrl focusable" data-act="play">⏯</button>
      <button class="ctrl focusable" data-act="close">✕</button>
    </div>
  </div>
  
  <div id="menuOverlay" style="position:absolute; inset:60px 0 60px 0; background:var(--bg); display:none; flex-direction:column; z-index:150; padding:20px; gap:12px;">
    <button class="video-card focusable" data-menu="home" style="padding:20px; text-align:left; font-size:16px; font-weight:600;">Go Home <span style="float:right;">⌂</span></button>
    <button class="video-card focusable" data-menu="account" style="padding:20px; text-align:left; font-size:16px; font-weight:600;">Account <span style="float:right;">👤</span></button>
    <button class="video-card focusable" data-menu="contrast" style="padding:20px; text-align:left; font-size:16px; font-weight:600;">Contrast <span style="float:right;">◐</span></button>
    <button class="video-card focusable" data-menu="live" style="padding:20px; text-align:left; font-size:16px; font-weight:600;">Live <span style="float:right;">●</span></button>
    <button class="video-card focusable" data-menu="close" style="padding:20px; text-align:left; font-size:16px; font-weight:600;">Close <span style="float:right;">✕</span></button>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyBWMwaHZgdhuGRM1iZvE9suCwbuyIfyH1g';
let currentFocus = null;
let currentScreen = 'home';

function openMenu() {
  document.getElementById('menuOverlay').style.display = 'flex';
  setTimeout(() => focusElement(document.querySelector('#menuOverlay .focusable')), 50);
}

function closeMenu() {
  document.getElementById('menuOverlay').style.display = 'none';
  focusElement(document.querySelector('.tab[data-tab="menu"]'));
}

function handleMenu(action) {
  if (action === 'home') {
    closeMenu();
    switchTab('home');
  } else if (action === 'close') {
    closeMenu();
  } else if (action === 'contrast') {
    document.body.classList.toggle('high-contrast');
    closeMenu();
  } else if (action === 'account') {
    closeMenu();
    alert('Account settings');
  } else if (action === 'live') {
    closeMenu();
    loadLive();
  }
}

async function loadLive() {
  const grid = document.getElementById('homeGrid');
  grid.innerHTML = '<div class="loading">Loading live...</div>';
  switchTab('home');
  const videos = await ytSearch({q: 'live', eventType: 'live', order: 'viewCount'});
  grid.innerHTML = '';
  videos.forEach(v => grid.appendChild(createVideoCard(v)));
  setTimeout(() => {
    const first = grid.querySelector('.video-card');
    if (first) focusElement(first);
  }, 100);
}

function init() {
  updateClock();
  setInterval(updateClock, 1000);
  buildKeyboard();
  loadHome();
  setupNavigation();
  setTimeout(() => focusElement(document.querySelector('.tab.active')), 100);
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function getFocusables() {
  const activeEl = document.querySelector('#player.show, #keyboard.show, #menuOverlay[style*="flex"]') || document.getElementById('app');
  return Array.from(activeEl.querySelectorAll('.focusable')).filter(el => {
    const style = window.getComputedStyle(el);
    return style.display !== 'none' && el.offsetParent !== null;
  });
}

function focusElement(el) {
  if (!el) return;
  document.querySelectorAll('.focused').forEach(e => e.classList.remove('focused'));
  el.classList.add('focused');
  currentFocus = el;
  el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
}

function moveFocus(dir) {
  const items = getFocusables();
  if (!items.length) return;
  
  let idx = items.indexOf(currentFocus);
  if (idx === -1) idx = 0;
  
  if (document.getElementById('keyboard').classList.contains('show') && currentFocus.classList.contains('key')) {
    const keys = Array.from(document.querySelectorAll('#keyboard .key'));
    const currentIdx = keys.indexOf(currentFocus);
    
    if (dir === 'left' && currentIdx > 0) {
      const prev = keys[currentIdx - 1];
      if (prev.closest('.kb-row') === currentFocus.closest('.kb-row')) {
        focusElement(prev); return;
      }
    }
    if (dir === 'right' && currentIdx < keys.length - 1) {
      const next = keys[currentIdx + 1];
      if (next.closest('.kb-row') === currentFocus.closest('.kb-row')) {
        focusElement(next); return;
      }
    }
    if (dir === 'up' || dir === 'down') {
      const rect = currentFocus.getBoundingClientRect();
      let best = null, bestDist = Infinity;
      keys.forEach(k => {
        if (k === currentFocus) return;
        const r = k.getBoundingClientRect();
        const isAbove = r.bottom <= rect.top + 5;
        const isBelow = r.top >= rect.bottom - 5;
        if ((dir === 'up' && isAbove) || (dir === 'down' && isBelow)) {
          const dist = Math.abs(r.left + r.width/2 - (rect.left + rect.width/2)) + Math.abs((dir === 'up' ? rect.top - r.bottom : r.top - rect.bottom));
          if (dist < bestDist) { bestDist = dist; best = k; }
        }
      });
      if (best) { focusElement(best); return; }
    }
  }
  
  if (currentFocus.classList.contains('video-card')) {
    const cards = Array.from(document.querySelectorAll('.screen.active .video-card'));
    const idx = cards.indexOf(currentFocus);
    if (idx !== -1) {
      if (dir === 'left' && idx > 0) { focusElement(cards[idx - 1]); return; }
      if (dir === 'right' && idx < cards.length - 1) { focusElement(cards[idx + 1]); return; }
      if (dir === 'up' && idx >= 2) { focusElement(cards[idx - 2]); return; }
      if (dir === 'down' && idx < cards.length - 2) { focusElement(cards[idx + 2]); return; }
      if (dir === 'down' && idx >= cards.length - 2) {
        const tabs = document.querySelectorAll('#tabs .tab');
        focusElement(tabs[Math.min(idx % 2, tabs.length - 1)]); return;
      }
    }
  }
  
  if (currentFocus.classList.contains('tab')) {
    const tabs = Array.from(document.querySelectorAll('#tabs .tab'));
    const idx = tabs.indexOf(currentFocus);
    if (dir === 'left' && idx > 0) { focusElement(tabs[idx - 1]); return; }
    if (dir === 'right' && idx < tabs.length - 1) { focusElement(tabs[idx + 1]); return; }
    if (dir === 'up') {
      const cards = Array.from(document.querySelectorAll('.screen.active .video-card'));
      if (cards.length) { focusElement(cards[Math.min(idx * 2, cards.length - 1)]); return; }
    }
  }
  
  const rect = currentFocus.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  let best = null, bestScore = Infinity;
  
  items.forEach(el => {
    if (el === currentFocus) return;
    const r = el.getBoundingClientRect();
    const ex = r.left + r.width / 2;
    const ey = r.top + r.height / 2;
    let score = Infinity;
    
    if (dir === 'up' && ey < cy) score = (cy - ey) * 1000 + Math.abs(ex - cx);
    if (dir === 'down' && ey > cy) score = (ey - cy) * 1000 + Math.abs(ex - cx);
    if (dir === 'left' && ex < cx) score = (cx - ex) * 1000 + Math.abs(ey - cy);
    if (dir === 'right' && ex > cx) score = (ex - cx) * 1000 + Math.abs(ey - cy);
    
    if (score < bestScore) { bestScore = score; best = el; }
  });
  
  if (best) focusElement(best);
}

function setupNavigation() {
  document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter',' '].includes(e.key)) e.preventDefault();
    switch(e.key) {
      case 'ArrowUp': moveFocus('up'); break;
      case 'ArrowDown': moveFocus('down'); break;
      case 'ArrowLeft': moveFocus('left'); break;
      case 'ArrowRight': moveFocus('right'); break;
      case 'Enter': case ' ': if (currentFocus) currentFocus.click(); break;
      case 'Escape': case 'Backspace':
        if (document.getElementById('player').classList.contains('show')) closePlayer();
        else if (document.getElementById('keyboard').classList.contains('show')) hideKeyboard();
        else if (document.getElementById('menuOverlay').style.display === 'flex') closeMenu();
        break;
    }
  });
  
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.tab === 'menu') {
        openMenu();
      } else {
        switchTab(tab.dataset.tab);
      }
    });
  });
  
  document.querySelectorAll('[data-menu]').forEach(item => {
    item.addEventListener('click', () => handleMenu(item.dataset.menu));
  });
  
  document.getElementById('searchBtn').addEventListener('click', showKeyboard);
  
  document.querySelectorAll('.ctrl').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      if (act === 'back' || act === 'close') closePlayer();
    });
  });
}

function switchTab(tab) {
  if (tab === 'menu') return;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  currentScreen = tab;
  
  if (tab === 'home' && !document.getElementById('homeGrid').children.length) loadHome();
  if (tab === 'shorts' && !document.getElementById('shortsGrid').children.length) loadShorts();
  if (tab === 'history') loadHistory();
  
  setTimeout(() => {
    const first = document.querySelector(`#${tab} .focusable`);
    if (first) focusElement(first);
  }, 50);
}

async function ytSearch(params) {
  const url = new URL('https://www.googleapis.com/youtube/v3/search');
  url.searchParams.set('part', 'snippet');
  url.searchParams.set('type', 'video');
  url.searchParams.set('key', API_KEY);
  url.searchParams.set('maxResults', '20');
  url.searchParams.set('regionCode', 'US');
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  
  try {
    const res = await fetch(url);
    const data = await res.json();
    return data.items || [];
  } catch (e) {
    return [];
  }
}

function createVideoCard(video) {
  const id = video.id.videoId || video.id;
  const card = document.createElement('div');
  card.className = 'video-card focusable';
  card.innerHTML = `
    <div class="thumb"><img src="${video.snippet.thumbnails.medium.url}" alt=""></div>
    <div class="info">
      <div class="title">${video.snippet.title}</div>
      <div class="channel">${video.snippet.channelTitle}</div>
    </div>
  `;
  card.addEventListener('click', () => playVideo(id, video));
  return card;
}

async function loadHome() {
  const grid = document.getElementById('homeGrid');
  grid.innerHTML = '<div class="loading">Loading...</div>';
  
  const queries = ['music', 'news', 'sports', 'comedy', 'gaming'];
  let allVideos = [];
  
  for (const q of queries) {
    const videos = await ytSearch({q, order: 'viewCount'});
    allVideos = allVideos.concat(videos.slice(0, 4));
    if (allVideos.length >= 20) break;
  }
  
  grid.innerHTML = '';
  allVideos.slice(0, 20).forEach(v => grid.appendChild(createVideoCard(v)));
  
  if (allVideos.length === 0) {
    grid.innerHTML = '<div class="loading">No videos found. Check connection.</div>';
  }
}

async function loadShorts() {
  const grid = document.getElementById('shortsGrid');
  grid.innerHTML = '<div class="loading">Loading...</div>';
  const videos = await ytSearch({q: 'shorts', videoDuration: 'short', order: 'date'});
  grid.innerHTML = '';
  videos.forEach(v => grid.appendChild(createVideoCard(v)));
}

function loadHistory() {
  const grid = document.getElementById('historyGrid');
  const history = JSON.parse(localStorage.getItem('starrtube_history') || '[]');
  grid.innerHTML = '';
  if (!history.length) {
    grid.innerHTML = '<div class="loading">No history</div>';
    return;
  }
  history.slice(0, 20).forEach(v => {
    const card = document.createElement('div');
    card.className = 'video-card focusable';
    card.innerHTML = `
      <div class="thumb"><img src="${v.thumbnail}" alt=""></div>
      <div class="info">
        <div class="title">${v.title}</div>
        <div class="channel">${v.channel}</div>
      </div>
    `;
    card.addEventListener('click', () => playVideo(v.id, v));
    grid.appendChild(card);
  });
}

function playVideo(id, video) {
  const history = JSON.parse(localStorage.getItem('starrtube_history') || '[]');
  const entry = {
    id,
    title: video.snippet?.title || video.title,
    channel: video.snippet?.channelTitle || video.channel,
    thumbnail: video.snippet?.thumbnails?.medium?.url || video.thumbnail
  };
  localStorage.setItem('starrtube_history', JSON.stringify([entry, ...history.filter(h => h.id !== id)].slice(0, 50)));
  
  document.getElementById('playerFrame').innerHTML = 
    `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1" allow="autoplay"></iframe>`;
  document.getElementById('player').classList.add('show');
  setTimeout(() => focusElement(document.querySelector('#player .ctrl')), 100);
}

function closePlayer() {
  document.getElementById('player').classList.remove('show');
  document.getElementById('playerFrame').innerHTML = '';
  focusElement(document.querySelector('.tab.active'));
}

function buildKeyboard() {
  const layout = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['Z','X','C','V','B','N','M','⌫'],
    ['BACK','SPACE','ENTER']
  ];
  const container = document.getElementById('kbKeys');
  container.innerHTML = '';
  
  layout.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';
    row.forEach(key => {
      const btn = document.createElement('button');
      btn.className = 'key focusable' + (key.length > 1 ? ' wide' : '');
      btn.textContent = key === 'SPACE' ? '␣' : key === 'BACK' ? '←' : key === 'ENTER' ? '↵' : key;
      btn.dataset.key = key;
      btn.addEventListener('click', () => handleKey(key));
      rowEl.appendChild(btn);
    });
    container.appendChild(rowEl);
  });
}

let kbText = '';
function showKeyboard() {
  kbText = '';
  document.getElementById('kbDisplay').textContent = '';
  document.getElementById('keyboard').classList.add('show');
  setTimeout(() => focusElement(document.querySelector('#keyboard .key')), 50);
}
function hideKeyboard() {
  document.getElementById('keyboard').classList.remove('show');
  focusElement(document.getElementById('searchBtn'));
}
function handleKey(key) {
  const display = document.getElementById('kbDisplay');
  if (key === '⌫') kbText = kbText.slice(0, -1);
  else if (key === 'SPACE') kbText += ' ';
  else if (key === 'ENTER') {
    hideKeyboard();
    if (kbText.trim()) searchVideos(kbText.trim());
    return;
  }
  else if (key === 'BACK') { hideKeyboard(); return; }
  else kbText += key.toLowerCase();
  display.textContent = kbText;
}

async function searchVideos(q) {
  const grid = document.getElementById('searchGrid');
  grid.innerHTML = '<div class="loading">Searching...</div>';
  switchTab('search');
  const videos = await ytSearch({q});
  grid.innerHTML = '';
  videos.forEach(v => grid.appendChild(createVideoCard(v)));
  setTimeout(() => {
    const first = grid.querySelector('.video-card');
    if (first) focusElement(first);
  }, 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
