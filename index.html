<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:Arial;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:28px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:11px;border-bottom:1px solid #333}
.header span:first-child{color:#0ff;font-weight:bold}
.grid{flex:1;overflow-y:auto;padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:5px;background:#000;align-content:start}
.card{background:#222;border:3px solid #444;border-radius:6px;padding:4px;cursor:pointer}
.card.active{border-color:#0ff;background:#033;box-shadow:0 0 10px #0ff}
.card img{width:100%;height:65px;object-fit:cover;background:#111;border-radius:3px;display:block}
.card-title{font-size:10px;margin-top:3px;height:24px;overflow:hidden;line-height:1.2}
.tabs{display:flex;height:32px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#000;border:none;color:#888;font-size:10px;font-weight:bold;border-right:1px solid #333}
.tab.active{background:#033;color:#0ff}
.player{position:fixed;inset:0;background:#000;display:none;z-index:100}
.player.show{display:block}
.back{position:absolute;top:10px;left:10px;z-index:101;background:#f00;color:#fff;border:2px solid #fff;padding:8px 18px;font-weight:bold;border-radius:6px;font-size:14px}
.player iframe{width:100%;height:100%;border:0}
.msg{grid-column:1/-1;text-align:center;padding:40px 20px;color:#0ff}
.error{color:#f66;background:#200;border:1px solid #f00;padding:15px;margin:10px;border-radius:5px;grid-column:1/-1}
</style>
</head>
<body>
<div class="header"><span>▶ STARRTUBE</span><span id="t"></span></div>
<div class="grid" id="g"></div>
<div class="player" id="p"><button class="back" id="b">◀ BACK</button><iframe id="f" allowfullscreen allow="autoplay"></iframe></div>
<div class="tabs">
  <button class="tab active" data-q="trending">HOME</button>
  <button class="tab" data-q="news">NEWS</button>
  <button class="tab" data-q="sports">SPORTS</button>
  <button class="tab" data-q="music">MUSIC</button>
  <button class="tab" data-q="gaming">GAMES</button>
  <button class="tab" data-q="movies">MOVIES</button>
</div>

<script>
const KEYS=['AIzaSyCxebesMswpVAubt4VhfpBP0IloB7B-6AE','AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU'];
let keyIndex=0, currentCard=0, cards=[];

setInterval(()=>document.getElementById('t').textContent=new Date().toLocaleTimeString(),1000);

function setActive(idx){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  if(cards[idx]){cards[idx].classList.add('active');cards[idx].scrollIntoView({block:'nearest'});currentCard=idx;}
}

async function load(q){
  const grid=document.getElementById('g');
  grid.innerHTML='<div class="msg">Loading...</div>';
  cards=[];currentCard=0;

  const apiKey=KEYS[keyIndex];
  const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=12&type=video&q=${encodeURIComponent(q)}&key=${apiKey}&regionCode=US`;

  try{
    const res=await fetch(url);
    const data=await res.json();

    if(data.error){
      throw new Error(data.error.message);
    }

    if(!data.items||data.items.length===0){
      throw new Error('No videos found');
    }

    grid.innerHTML='';
    data.items.forEach((v,i)=>{
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}" loading="lazy"><div class="card-title">${v.snippet.title}</div>`;
      card.onclick=()=>play(v.id.videoId);
      grid.appendChild(card);
      cards.push(card);
    });

    setActive(0);

  }catch(err){
    console.error(err);

    // Try fallback key
    if(keyIndex===0){
      keyIndex=1;
      grid.innerHTML=`<div class="error">New key failed: ${err.message}<br><br>Trying backup key...</div>`;
      setTimeout(()=>load(q),1000);
      return;
    }

    // Both keys failed - show test data
    grid.innerHTML=`<div class="error">API Error: ${err.message}<br><small>Both keys failed. Showing demo.</small></div>`;
    for(let i=0;i<8;i++){
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`<img src="https://i.ytimg.com/vi/dQw4w9WgXcQ/mqdefault.jpg"><div class="card-title">Demo Video ${i+1} - API needs YouTube Data API enabled</div>`;
      card.onclick=()=>play('dQw4w9WgXcQ');
      grid.appendChild(card);
      cards.push(card);
    }
    setActive(0);
  }
}

function play(id){
  document.getElementById('p').classList.add('show');
  document.getElementById('f').src=`https://www.youtube.com/embed/${id}?autoplay=1`;
}

document.getElementById('b').onclick=()=>{
  document.getElementById('p').classList.remove('show');
  document.getElementById('f').src='';
};

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    load(tab.dataset.q);
  };
});

// Keyboard navigation
document.addEventListener('keydown',e=>{
  if(document.getElementById('p').classList.contains('show')){
    if(e.key==='Escape'||e.key==='Backspace'){document.getElementById('b').click();}
    return;
  }

  if(e.key==='ArrowRight'&&currentCard%2===0&&cards[currentCard+1])setActive(currentCard+1);
  else if(e.key==='ArrowLeft'&&currentCard%2===1)setActive(currentCard-1);
  else if(e.key==='ArrowDown'&&cards[currentCard+2])setActive(currentCard+2);
  else if(e.key==='ArrowUp'&&currentCard>=2)setActive(currentCard-2);
  else if(e.key==='Enter'&&cards[currentCard])cards[currentCard].click();
});

// Start
load('trending');
</script>
</body>
</html>
