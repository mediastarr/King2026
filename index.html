<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;width:600px;height:600px;overflow:hidden;display:flex;flex-direction:column}
.header{height:50px;background:#111;display:flex;align-items:center;padding:0 15px;font-weight:bold;border-bottom:1px solid #333}
.searchbar{display:none;height:50px;background:#111;padding:8px;border-bottom:1px solid #333}
.searchbar.show{display:flex}
.searchbar input{flex:1;background:#222;border:1px solid #444;color:#fff;padding:0 12px;border-radius:6px;font-size:14px;outline:none}
.searchbar input:focus{border-color:#0ff}
.searchbar button{background:#0ff;color:#000;border:none;padding:0 15px;margin-left:8px;border-radius:6px;font-weight:bold;cursor:pointer}
.grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;overflow:auto;align-content:start}
.card{background:#222;border:3px solid #222;border-radius:8px;padding:8px;cursor:pointer}
.card:focus{border-color:#0ff;outline:none}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px;background:#000}
.card div{font-size:12px;margin-top:4px;height:28px;overflow:hidden;line-height:1.2}
.tabs{height:60px;display:flex;background:#111;border-top:1px solid #333}
.tab{flex:1;background:none;border:3px solid transparent;color:#888;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;gap:2px}
.tab:focus{border-color:#0ff;color:#0ff;outline:none}
.tab.active{color:#0ff}
.loading{grid-column:1/-1;text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div class="header">▶ StarrTube</div>
<div class="searchbar" id="searchbar">
  <input id="q" placeholder="Search YouTube..." onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()">Go</button>
</div>
<div class="grid" id="g"></div>
<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'home')">⌂<span>Home</span></button>
  <button class="tab" onclick="switchTab(this,'search')">⌕<span>Search</span></button>
  <button class="tab" onclick="switchTab(this,'news')">📰<span>News</span></button>
  <button class="tab" onclick="switchTab(this,'sports')">⚽<span>Sports</span></button>
  <button class="tab" onclick="switchTab(this,'gaming')">🎮<span>Gaming</span></button>
</div>

<script>
const KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
const g=document.getElementById('g');
const searchbar=document.getElementById('searchbar');
const q=document.getElementById('q');

async function load(query){
  g.innerHTML='<div class="loading">Loading...</div>';
  searchbar.classList.remove('show');
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(query)}&key=${KEY}&regionCode=US`);
    const d=await r.json();
    g.innerHTML='';
    d.items.forEach(v=>{
      const c=document.createElement('div');
      c.className='card';c.tabIndex=0;
      c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}" loading="lazy"><div>${v.snippet.title}</div>`;
      c.onclick=()=>window.open(`https://m.youtube.com/watch?v=${v.id.videoId}`,'_blank');
      g.appendChild(c);
    });
    g.firstChild?.focus();
  }catch(e){g.innerHTML='<div class="loading">Error loading videos</div>'}
}

function switchTab(btn,type){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(type==='home')load('trending music');
  else if(type==='search'){searchbar.classList.add('show');q.focus();q.select();g.innerHTML='<div class="loading">Enter search above</div>'}
  else if(type==='news')load('news today');
  else if(type==='sports')load('sports highlights');
  else if(type==='gaming')load('gaming');
}

function doSearch(){
  const term=q.value.trim();
  if(term){load(term);q.blur()}
}

// D-pad navigation
document.addEventListener('keydown',e=>{
  const f=document.activeElement;
  const cards=[...document.querySelectorAll('.card')];
  const tabs=[...document.querySelectorAll('.tab')];
  const i=cards.indexOf(f);
  const ti=tabs.indexOf(f);

  if(e.key==='ArrowRight'){
    if(i>=0&&i%2===0&&cards[i+1]){e.preventDefault();cards[i+1].focus()}
    else if(ti>=0&&ti<4){e.preventDefault();tabs[ti+1].focus()}
  }
  if(e.key==='ArrowLeft'){
    if(i>=0&&i%2===1){e.preventDefault();cards[i-1].focus()}
    else if(ti>0){e.preventDefault();tabs[ti-1].focus()}
  }
  if(e.key==='ArrowDown'){
    if(i>=0&&cards[i+2]){e.preventDefault();cards[i+2].focus()}
    else if(i>=0){e.preventDefault();tabs[0].focus()}
    else if(ti>=0){e.preventDefault();cards[0]?.focus()}
  }
  if(e.key==='ArrowUp'){
    if(i>=2){e.preventDefault();cards[i-2].focus()}
    else if(i>=0){e.preventDefault();tabs[0].focus()}
  }
  if(e.key==='Escape'&&searchbar.classList.contains('show')){
    searchbar.classList.remove('show');
    document.querySelector('.tab.active').focus();
  }
});

// Start
load('trending music');
</script>
</body>
</html>
