<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:Arial;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:28px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 8px;font-size:11px;border-bottom:1px solid #333}
.header span:first-child{color:#0ff;font-weight:bold}
.main{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.grid{flex:1;overflow-y:auto;padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:5px;background:#000;align-content:start}
.card{background:#222;border:3px solid #444;border-radius:6px;padding:4px;cursor:pointer}
.card.active{border-color:#0ff;background:#033;box-shadow:0 0 10px #0ff}
.card img{width:100%;height:65px;object-fit:cover;background:#111;border-radius:3px;display:block}
.card-title{font-size:10px;margin-top:3px;height:24px;overflow:hidden;line-height:1.2}
.keyboard{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:20;padding:10px}
.keyboard.show{display:flex}
.kb-display{background:#011;padding:12px;text-align:center;border:2px solid #0ff;border-radius:6px;margin-bottom:10px}
.kb-text{font-size:26px;color:#0ff;font-family:monospace;min-height:30px}
.kb-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;flex:1;align-content:start;overflow-y:auto}
.kb-key{background:#222;border:2px solid #555;color:#fff;font-size:18px;font-weight:bold;border-radius:5px;height:48px;display:flex;align-items:center;justify-content:center}
.kb-key.active{background:#0ff;color:#000;border-color:#0ff}
.kb-key.wide{grid-column:span 2;font-size:14px}
.tabs{display:flex;height:32px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#000;border:none;color:#888;font-size:10px;font-weight:bold;border-right:1px solid #333;position:relative}
.tab.active{background:#033;color:#0ff}
.tab.focus{outline:2px solid #0ff;outline-offset:-2px;z-index:5}
.player{position:fixed;inset:0;background:#000;display:none;z-index:100}
.player.show{display:block}
.back{position:absolute;top:10px;left:10px;z-index:101;background:#f00;color:#fff;border:2px solid #fff;padding:8px 18px;font-weight:bold;border-radius:6px;font-size:14px}
.player iframe{width:100%;height:100%;border:0}
.msg{grid-column:1/-1;text-align:center;padding:40px 20px;color:#0ff}
.error{color:#f66;background:#200;border:1px solid #f00;padding:12px;margin:8px;border-radius:5px;grid-column:1/-1;font-size:10px}
.key-status{position:absolute;top:30px;right:5px;background:rgba(0,0,0,0.8);color:#0ff;font-size:9px;padding:3px 6px;border-radius:3px;z-index:15}
.count-badge{position:absolute;top:2px;right:2px;background:#0ff;color:#000;font-size:8px;padding:1px 4px;border-radius:2px;font-weight:bold}
</style>
</head>
<body>
<div class="header"><span>▶ STARRTUBE</span><span id="t"></span></div>
<div class="main">
  <div class="key-status" id="ks">Key 1/7</div>
  <div class="grid" id="g"></div>
  <div class="keyboard" id="kb">
    <div class="kb-display"><div class="kb-text" id="kt">_</div></div>
    <div class="kb-grid" id="kg"></div>
  </div>
</div>
<div class="player" id="p"><button class="back" id="b">◀ BACK</button><iframe id="f" allowfullscreen allow="autoplay"></iframe></div>
<div class="tabs">
  <button class="tab active" data-tab="home">HOME<span class="count-badge" id="c-home">0</span></button>
  <button class="tab" data-tab="search">SEARCH<span class="count-badge" id="c-search">0</span></button>
  <button class="tab" data-tab="news">NEWS<span class="count-badge" id="c-news">0</span></button>
  <button class="tab" data-tab="sports">SPORTS<span class="count-badge" id="c-sports">0</span></button>
  <button class="tab" data-tab="music">MUSIC<span class="count-badge" id="c-music">0</span></button>
  <button class="tab" data-tab="live">LIVE<span class="count-badge" id="c-live">0</span></button>
</div>

<script>
const KEYS=['AIzaSyCxebesMswpVAubt4VhfpBP0IloB7B-6AE','AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU','AIzaSyA52UFVj2C-GKlX5nluPKHsqZThiyCnN48','AIzaSyC_5YNCC8nLEJzR-a_3jLCWB5Bt-ItjNds','AIzaSyC7lIhVU022mls-kplFDctiLiKmz_gZuE8','AIzaSyAXU8px5AsEy0EyaqXIHuNI54HhvPBNimc','AIzaSyAgoLgY55op-mYbDA5CQdU0p4QUFhtlbgk'];
let keyIdx=0, curCard=0, curTab=0, focusMode='cards', cards=[], searchTxt='', kbIdx=0;

setInterval(()=>document.getElementById('t').textContent=new Date().toLocaleTimeString(),1000);
function updateKeyStatus(){document.getElementById('ks').textContent=`Key ${keyIdx+1}/${KEYS.length}`;}
function setCardActive(i){document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));if(cards[i]){cards[i].classList.add('active');cards[i].scrollIntoView({block:'nearest'});curCard=i;focusMode='cards';}}
function setTabFocus(i){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('focus'));const tabs=document.querySelectorAll('.tab');if(tabs[i]){tabs[i].classList.add('focus');curTab=i;focusMode='tabs';}}
function setKbActive(i){document.querySelectorAll('.kb-key').forEach(k=>k.classList.remove('active'));const keys=document.querySelectorAll('.kb-key');if(keys[i]){keys[i].classList.add('active');kbIdx=i;focusMode='keyboard';}}

const kg=document.getElementById('kg'),kt=document.getElementById('kt');
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c=>{const k=document.createElement('div');k.className='kb-key';k.textContent=c;k.onclick=()=>{searchTxt+=c;kt.textContent=searchTxt||'_';};kg.appendChild(k);});
[{t:'SPACE',v:' '},{t:'DEL',v:'del'},{t:'CLEAR',v:'clr'},{t:'BACK',v:'back',w:1},{t:'SEARCH',v:'go',w:1}].forEach(({t,v,w})=>{const k=document.createElement('div');k.className='kb-key'+(w?' wide':'');k.textContent=t;k.onclick=()=>{if(v==='go'&&searchTxt){document.getElementById('kb').classList.remove('show');load('search',searchTxt);searchTxt='';kt.textContent='_';}else if(v==='back'){document.getElementById('kb').classList.remove('show');setTabFocus(1);}else if(v==='del'){searchTxt=searchTxt.slice(0,-1);kt.textContent=searchTxt||'_';}else if(v==='clr'){searchTxt='';kt.textContent='_';}else{searchTxt+=v;kt.textContent=searchTxt;}};kg.appendChild(k);});

async function load(tab,q){
  const grid=document.getElementById('g');
  grid.innerHTML='<div class="msg">Loading...</div>';
  cards=[];curCard=0;focusMode='cards';updateKeyStatus();
  const counts={home:35,search:30,news:25,sports:20,music:35,live:25};
  const queries={home:'trending US viral',news:'breaking news US today',sports:'NFL NBA MLB highlights US',music:'top hits Billboard 2024',live:'live now',search:q||''};
  const key=KEYS[keyIdx];
  const maxResults=counts[tab];
  let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=${maxResults}&type=video&q=${encodeURIComponent(queries[tab])}&key=${key}&regionCode=US`;
  if(tab==='live')url+='&eventType=live&order=viewCount';else url+='&order=date&publishedAfter='+new Date(Date.now()-14*24*60*60*1000).toISOString();
  try{
    const r=await fetch(url);
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    if(!d.items?.length)throw new Error('No results');
    grid.innerHTML='';
    d.items.forEach(v=>{
      const c=document.createElement('div');
      c.className='card';
      c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div class="card-title">${v.snippet.title}</div>`;
      c.onclick=()=>play(v.id.videoId);
      grid.appendChild(c);
      cards.push(c);
    });
    document.getElementById(`c-${tab}`).textContent=d.items.length;
    setCardActive(0);
  }catch(e){
    if(keyIdx < KEYS.length-1){keyIdx++;grid.innerHTML=`<div class="error">Key ${keyIdx} failed<br>Trying ${keyIdx+1}/${KEYS.length}</div>`;updateKeyStatus();setTimeout(()=>load(tab,q),800);return;}
    grid.innerHTML=`<div class="error">All keys failed: ${e.message}</div>`;keyIdx=0;
  }
}

function play(id){document.getElementById('p').classList.add('show');document.getElementById('f').src=`https://www.youtube.com/embed/${id}?autoplay=1`;}
document.getElementById('b').onclick=()=>{document.getElementById('p').classList.remove('show');document.getElementById('f').src='';setTimeout(()=>setCardActive(curCard),100);};

document.querySelectorAll('.tab').forEach((tab,i)=>{
  tab.onclick=(e)=>{
    e.stopPropagation();
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    curTab=i;
    const t=tab.dataset.tab;
    if(t==='search'){document.getElementById('kb').classList.add('show');searchTxt='';kt.textContent='_';setKbActive(0);}
    else{document.getElementById('kb').classList.remove('show');load(t);}
  };
});

document.addEventListener('keydown',e=>{
  if(document.getElementById('p').classList.contains('show')){if(['Escape','Backspace'].includes(e.key))document.getElementById('b').click();return;}
  const kbOpen=document.getElementById('kb').classList.contains('show');
  const tabs=document.querySelectorAll('.tab');
  if(kbOpen&&focusMode==='keyboard'){
    const keys=document.querySelectorAll('.kb-key');
    if(e.key==='ArrowRight'&&kbIdx<keys.length-1){e.preventDefault();setKbActive(kbIdx+1);}
    else if(e.key==='ArrowLeft'&&kbIdx>0){e.preventDefault();setKbActive(kbIdx-1);}
    else if(e.key==='ArrowDown'&&kbIdx+5<keys.length){e.preventDefault();setKbActive(kbIdx+5);}
    else if(e.key==='ArrowUp'&&kbIdx>=5){e.preventDefault();setKbActive(kbIdx-5);}
    else if(e.key==='Enter'){e.preventDefault();keys[kbIdx].click();}
    return;
  }
  if(focusMode==='tabs'){
    if(e.key==='ArrowRight'&&curTab<5){e.preventDefault();setTabFocus(curTab+1);}
    else if(e.key==='ArrowLeft'&&curTab>0){e.preventDefault();setTabFocus(curTab-1);}
    else if(e.key==='ArrowUp'&&cards.length){e.preventDefault();setCardActive(Math.min(curCard,cards.length-1));}
    else if(e.key==='Enter'){e.preventDefault();tabs[curTab].click();}
    return;
  }
  if(focusMode==='cards'){
    if(e.key==='ArrowRight'&&curCard%2===0&&cards[curCard+1]){e.preventDefault();setCardActive(curCard+1);}
    else if(e.key==='ArrowLeft'&&curCard%2===1){e.preventDefault();setCardActive(curCard-1);}
    else if(e.key==='ArrowDown'){e.preventDefault();if(cards[curCard+2])setCardActive(curCard+2);else setTabFocus(curTab);}
    else if(e.key==='ArrowUp'){
      e.preventDefault();
      if(curCard<2){
        // ALWAYS go to HOME tab (index 0) when pressing UP from top row
        setTabFocus(0);
      }else{
        setCardActive(curCard-2);
      }
    }
    else if(e.key==='Enter'&&cards[curCard]){e.preventDefault();cards[curCard].click();}
  }
});

updateKeyStatus();
load('home');
</script>
</body>
</html>
