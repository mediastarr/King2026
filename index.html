<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#fff;font-family:monospace;width:600px;height:600px;overflow:hidden;display:flex;flex-direction:column;font-size:12px}
.header{height:30px;background:#111;padding:5px;display:flex;justify-content:space-between;align-items:center}
.grid{flex:1;overflow:auto;padding:5px;display:grid;grid-template-columns:1fr 1fr;gap:5px;align-content:start}
.card{background:#222;border:2px solid #444;padding:5px;cursor:pointer;border-radius:4px}
.card:focus{border-color:#0ff;outline:none}
.card img{width:100%;height:80px;object-fit:cover;background:#000}
.card div{height:28px;overflow:hidden;font-size:10px;margin-top:2px}
.tabs{display:flex;height:40px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#222;margin:2px;border:1px solid #444;color:#888;font-size:9px;cursor:pointer}
.tab.active{background:#0a2a2a;color:#0ff}
.keyboard{background:#111;padding:5px;display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-height:100px;overflow:auto}
.kb-key{background:#333;border:1px solid #555;color:#fff;height:24px;font-size:10px;cursor:pointer}
.kb-key:focus{background:#0ff;color:#000;outline:none}
.searchbox{background:#111;padding:5px;display:flex;gap:5px}
.searchbox input{flex:1;background:#222;border:1px solid #444;color:#fff;padding:4px;font-size:11px}
.player{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:99}
.player.show{display:flex}
.player iframe{flex:1;border:0}
.player button{height:35px;background:#f00;color:#fff;border:none;font-weight:bold}
.debug{background:#200;padding:3px;font-size:9px;color:#fa0;max-height:40px;overflow:auto}
</style>
</head>
<body>
<div class="header">
  <span>TEST APP</span>
  <span id="status">Loading...</span>
</div>
<div class="debug" id="debug"></div>
<div class="searchbox" id="searchbox" style="display:none">
  <input id="q" placeholder="type here">
  <button onclick="doSearch()">SEARCH</button>
</div>
<div class="keyboard" id="kb" style="display:none"></div>
<div class="grid" id="grid"></div>

<div class="player" id="player">
  <iframe id="frame" allow="autoplay"></iframe>
  <button onclick="closePlayer()">← CLOSE PLAYER</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="loadHome()">HOME</button>
  <button class="tab" onclick="showSearch()">SEARCH</button>
  <button class="tab" onclick="loadCat('news')">NEWS</button>
  <button class="tab" onclick="loadCat('sports')">SPORTS</button>
  <button class="tab" onclick="loadCat('gaming')">GAMING</button>
  <button class="tab" onclick="loadLive()">LIVE</button>
</div>

<script>
const KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
const debug=document.getElementById('debug');
function log(m){debug.innerHTML=m+'<br>'+debug.innerHTML;console.log(m)}

// Build keyboard - ALWAYS VISIBLE IN SEARCH
const kb=document.getElementById('kb');
'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 '.split('').forEach(l=>{
  const b=document.createElement('button');
  b.className='kb-key';b.textContent=l;b.tabIndex=0;
  b.onclick=()=>{document.getElementById('q').value+=l};
  kb.appendChild(b);
});
const del=document.createElement('button');
del.className='kb-key';del.textContent='⌫';del.style.background='#800';
del.onclick=()=>{const q=document.getElementById('q');q.value=q.value.slice(0,-1)};
kb.appendChild(del);

async function loadVideos(query, params={}){
  document.getElementById('status').textContent='Loading...';
  log('Loading: '+query);
  const grid=document.getElementById('grid');
  grid.innerHTML='';

  try{
    const url=new URL('https://www.googleapis.com/youtube/v3/search');
    url.searchParams.set('part','snippet');
    url.searchParams.set('type','video');
    url.searchParams.set('key',KEY);
    url.searchParams.set('maxResults','20');
    url.searchParams.set('regionCode','US');
    url.searchParams.set('relevanceLanguage','en');
    url.searchParams.set('videoEmbeddable','true');
    url.searchParams.set('videoDuration','medium'); // AVOIDS SHORTS (shorts are <4min)
    url.searchParams.set('q',query);
    Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));

    log('API call...');
    const r=await fetch(url);
    const data=await r.json();

    if(data.error){log('ERROR: '+data.error.message);grid.innerHTML='API ERROR';return}
    log('Found '+data.items.length+' videos');

    data.items.forEach((v,i)=>{
      const card=document.createElement('div');
      card.className='card';card.tabIndex=0;
      const isShort=v.snippet.title.toLowerCase().includes('shorts')||v.snippet.title.includes('#shorts');
      card.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div>${isShort?'[SHORT] ':''}${v.snippet.title.substring(0,50)}</div>`;
      card.onclick=()=>playVideo(v.id.videoId, v.snippet.title);
      card.onkeydown=e=>{if(e.key==='Enter')playVideo(v.id.videoId, v.snippet.title)};
      grid.appendChild(card);
      if(i===0)setTimeout(()=>card.focus(),100);
    });
    document.getElementById('status').textContent='Loaded '+data.items.length;
  }catch(e){log('FETCH ERROR: '+e);grid.innerHTML='Error'}
}

function playVideo(id,title){
  log('Playing: '+id);
  document.getElementById('status').textContent='Playing...';
  const player=document.getElementById('player');
  const frame=document.getElementById('frame');
  frame.src=`https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&playsinline=1`;
  player.classList.add('show');
  log('Player opened');
}

function closePlayer(){
  document.getElementById('player').classList.remove('show');
  document.getElementById('frame').src='';
  document.getElementById('status').textContent='Closed';
  log('Player closed');
}

function loadHome(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[0].classList.add('active');
  document.getElementById('searchbox').style.display='none';
  document.getElementById('kb').style.display='none';
  // Load BROAD US content, filter out shorts by duration
  loadVideos('popular videos United States 2024', {order:'viewCount',videoDuration:'medium'});
}

function loadCat(cat){
  document.getElementById('searchbox').style.display='none';
  document.getElementById('kb').style.display='none';
  loadVideos(cat+' US');
}

function loadLive(){
  loadVideos('live', {eventType:'live',order:'date'});
}

function showSearch(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[1].classList.add('active');
  document.getElementById('searchbox').style.display='flex';
  document.getElementById('kb').style.display='grid';
  document.getElementById('grid').innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:#888">Use keyboard below, then click SEARCH</div>';
  document.getElementById('q').value='';
  document.getElementById('q').focus();
  log('Search mode - keyboard visible');
}

function doSearch(){
  const q=document.getElementById('q').value;
  if(q){
    document.getElementById('searchbox').style.display='none';
    document.getElementById('kb').style.display='none';
    loadVideos(q);
  }
}

// Arrow navigation
document.addEventListener('keydown',e=>{
  if(document.getElementById('player').classList.contains('show')){
    if(e.key==='Escape'){e.preventDefault();closePlayer()}
    return;
  }
  const cards=[...document.querySelectorAll('.card')];
  const i=cards.indexOf(document.activeElement);
  if(e.key==='ArrowRight'&&cards[i+1]){e.preventDefault();cards[i+1].focus()}
  if(e.key==='ArrowLeft'&&i>0){e.preventDefault();cards[i-1].focus()}
  if(e.key==='ArrowDown'&&cards[i+2]){e.preventDefault();cards[i+2].focus()}
  if(e.key==='ArrowUp'&&cards[i-2]){e.preventDefault();cards[i-2].focus()}
});

log('App started');
loadHome();
</script>
</body>
</html>
