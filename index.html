<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#0ff;font-family:Arial,sans-serif;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:26px;background:#111;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border-bottom:2px solid #0ff}
.display{background:#001a1a;padding:8px;text-align:center;border-bottom:2px solid #0ff}
.display-main{font-size:26px;color:#0ff;min-height:30px;font-weight:bold;font-family:'Courier New',monospace}
.display-sub{font-size:9px;color:#0aa;margin-top:2px}
.wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.scroll{flex:1;overflow-y:auto;padding:3px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.key{background:#222;border:2px solid #555;color:#fff;font-size:20px;font-weight:bold;border-radius:5px;height:48px;width:100%}
.key:active{background:#0ff;color:#000}
.bar{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px;background:#000;border-top:2px solid #0ff}
.btn{height:50px;font-size:16px;font-weight:bold;border:2px solid;border-radius:5px}
.btn.enter{background:#020;border-color:#0f0;color:#0f0;grid-column:span 2}
.btn.back{background:#200;border-color:#f00;color:#f88}
.btn.clear{background:#111;border-color:#666;color:#aaa}
</style>
</head>
<body>
<div class="header">SIMPLE BUTTONS - TAP TO TYPE</div>
<div class="display">
  <div class="display-main" id="out">_</div>
  <div class="display-sub" id="hint">Ready</div>
</div>
<div class="wrap">
  <div class="scroll">
    <div class="grid" id="keys"></div>
  </div>
  <div class="bar">
    <button class="btn clear" id="clr">CLEAR</button>
    <button class="btn back" id="back">BACK</button>
    <button class="btn enter" id="enter">SEARCH</button>
  </div>
</div>

<script>
let txt = '';
let lastTime = 0;
let lastChar = '';

const out = document.getElementById('out');
const hint = document.getElementById('hint');
const keys = document.getElementById('keys');

function update() {
  out.textContent = txt || '_';
  hint.textContent = txt ? txt : 'Tap letters';
}

// Create buttons - SIMPLE
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c => {
  const b = document.createElement('button');
  b.className = 'key';
  b.textContent = c;
  b.type = 'button';
  
  b.onclick = function() {
    const now = Date.now();
    // Block double tap
    if (c === lastChar && (now - lastTime) < 250) {
      hint.textContent = 'Blocked double';
      setTimeout(update, 500);
      return;
    }
    lastChar = c;
    lastTime = now;
    
    txt += c.toLowerCase();
    update();
    
    // Flash
    b.style.background = '#0ff';
    setTimeout(() => b.style.background = '', 100);
  };
  
  keys.appendChild(b);
});

// Space
const sp = document.createElement('button');
sp.className = 'key';
sp.textContent = 'SPACE';
sp.style.gridColumn = 'span 4';
sp.style.fontSize = '14px';
sp.onclick = () => { txt += ' '; update(); };
keys.appendChild(sp);

// Buttons
document.getElementById('clr').onclick = () => { txt = ''; update(); };
document.getElementById('back').onclick = () => { alert('BACK'); };
document.getElementById('enter').onclick = () => { 
  if(txt) alert('SEARCH: ' + txt);
  else hint.textContent = 'Type first';
};

update();
</script>
</body>
</html>
