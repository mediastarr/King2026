<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;width:600px;height:600px;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;height:540px;overflow:auto}
.card{background:#222;border:3px solid #222;border-radius:8px;padding:8px;cursor:pointer}
.card:focus{border-color:#0ff;outline:none}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px}
.card div{font-size:12px;margin-top:4px;height:28px;overflow:hidden}
.tabs{height:60px;display:flex;background:#111;border-top:1px solid #333}
.tab{flex:1;background:none;border:3px solid transparent;color:#888;display:flex;align-items:center;justify-content:center;cursor:pointer}
.tab:focus{border-color:#0ff;color:#0ff;outline:none}
</style>
</head>
<body>
<div class="grid" id="g"></div>
<div class="tabs">
  <button class="tab" onclick="load('music')">Home</button>
  <button class="tab" onclick="load('news')">News</button>
  <button class="tab" onclick="load('sports')">Sports</button>
  <button class="tab" onclick="load('gaming')">Gaming</button>
  <button class="tab" onclick="load('live')">Live</button>
</div>
<script>
const KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
async function load(q){
  g.innerHTML='Loading...';
  const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${q}&key=${KEY}`);
  const d=await r.json();
  g.innerHTML='';
  d.items.forEach(v=>{
    const c=document.createElement('div');
    c.className='card';c.tabIndex=0;
    c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div>${v.snippet.title}</div>`;
    c.onclick=()=>open(`https://m.youtube.com/watch?v=${v.id.videoId}`);
    g.appendChild(c);
  });
  g.firstChild?.focus();
}
document.addEventListener('keydown',e=>{
  const f=document.activeElement;
  const cards=[...document.querySelectorAll('.card')];
  const i=cards.indexOf(f);
  if(e.key==='ArrowRight'&&i%2===0&&cards[i+1])cards[i+1].focus();
  if(e.key==='ArrowLeft'&&i%2===1)cards[i-1].focus();
  if(e.key==='ArrowDown'&&cards[i+2])cards[i+2].focus();
  if(e.key==='ArrowUp'&&cards[i-2])cards[i-2].focus();
  if(e.key==='ArrowDown'&&!f.classList.contains('card'))document.querySelector('.card')?.focus();
});
load('music');
</script>
</body>
</html>
