<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600">
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;width:600px;height:600px;overflow:hidden;display:flex;flex-direction:column}
.header{height:28px;background:#111;padding:0 6px;display:flex;align-items:center;justify-content:space-between;font-size:10px}
.grid{flex:1;overflow:auto;padding:2px;display:grid;grid-template-columns:1fr 1fr;gap:2px;align-content:start}
.card{background:#1a1a1a;border:2px solid #333;padding:2px;cursor:pointer}
.card:focus{border-color:#0ff;outline:none}
.card img{width:100%;height:65px;object-fit:cover;background:#000}
.card div{height:22px;overflow:hidden;font-size:9px}
.tabs{display:flex;height:34px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#1a1a1a;margin:1px;border:1px solid #333;color:#888;font-size:7px;cursor:pointer}
.tab.active{background:#0a2222;color:#0ff}
.searchbox{background:#111;padding:2px;display:flex;gap:2px}
.searchbox input{flex:1;background:#222;border:1px solid #444;color:#fff;padding:2px;font-size:10px}
.searchbox button{background:#0ff;color:#000;border:none;padding:2px 6px;font-size:9px;font-weight:bold;cursor:pointer;min-width:28px}
.keyboard{background:#111;padding:2px;display:grid;grid-template-columns:repeat(10,1fr);gap:1px;max-height:80px}
.kb-key{background:#222;border:1px solid #444;color:#fff;height:18px;font-size:8px;cursor:pointer;user-select:none;-webkit-user-select:none}
.kb-key:active{background:#0aa}
.kb-key.wide{grid-column:span 2}
.player{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:99}
.player.show{display:flex}
.player iframe{flex:1;border:0}
.player-bar{height:36px;background:#111;display:flex;align-items:center;gap:3px;padding:0 3px}
.ctrl{background:#333;border:none;color:#fff;padding:4px 6px;border-radius:2px;font-size:11px;cursor:pointer}
.ctrl:focus{background:#0ff;color:#000;outline:none}
</style>
</head>
<body>
<div class="header"><span>StarrTube</span><span id="t"></span></div>
<div class="searchbox" id="sb" style="display:none">
  <input id="q" placeholder="Search" autocomplete="off" autocorrect="off" spellcheck="false">
  <button id="go" type="button">GO</button>
  <button id="clr" type="button">X</button>
</div>
<div class="keyboard" id="kb" style="display:none"></div>
<div class="grid" id="g"></div>
<div class="player" id="p">
  <iframe id="f" allow="autoplay"></iframe>
  <div class="player-bar">
    <button class="ctrl" id="b10">⏪</button>
    <button class="ctrl" id="pp" style="font-size:14px">⏯</button>
    <button class="ctrl" id="f10">⏩</button>
    <button class="ctrl" id="fs" style="margin-left:auto">⛶</button>
    <button class="ctrl" id="x" style="background:#800">✕</button>
  </div>
</div>
<div class="tabs">
  <button class="tab active">Home</button>
  <button class="tab">Search</button>
  <button class="tab">News</button>
  <button class="tab">Sports</button>
  <button class="tab">Gaming</button>
  <button class="tab">Live</button>
</div>

<script>
const KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let YTP, lastKeyTime=0, lastKeyChar='';
setInterval(()=>t.textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));

// DEBOUNCED keyboard - prevents double input within 200ms
const kb=document.getElementById('kb'), q=document.getElementById('q');

function addChar(char){
  const now=Date.now();
  // Prevent same char within 200ms (debounce)
  if(char===lastKeyChar && now-lastKeyTime<200){
    console.log('Blocked double:',char);
    return;
  }
  lastKeyChar=char;
  lastKeyTime=now;
  q.value += char;
  q.focus();
}

'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
  const b=document.createElement('button');
  b.className='kb-key'; b.textContent=l; b.type='button';
  // Use pointerdown instead of click, prevent all defaults
  b.onpointerdown = b.ontouchstart = (e)=>{e.preventDefault();e.stopPropagation();addChar(l.toLowerCase());return false};
  b.onclick = (e)=>{e.preventDefault();return false}; // Block click
  kb.appendChild(b);
});

[{t:'SPACE',c:' '},{t:'DEL',c:'del'},{t:'CLR',c:'clr'}].forEach(x=>{
  const b=document.createElement('button');
  b.className='kb-key wide'; b.textContent=x.t; b.type='button';
  b.onpointerdown = (e)=>{e.preventDefault();e.stopPropagation();
    if(x.c==='del')q.value=q.value.slice(0,-1);
    else if(x.c===' ')q.value+=' ';
    else q.value='';
    q.focus(); return false
  };
  b.onclick=(e)=>{e.preventDefault();return false};
  kb.appendChild(b);
});

document.getElementById('go').onpointerdown=(e)=>{e.preventDefault();search()};
document.getElementById('clr').onpointerdown=(e)=>{e.preventDefault();q.value='';q.focus()};

const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);

async function load(query){
  g.innerHTML='<div style="grid-column:1/-1;padding:15px;color:#666;text-align:center;font-size:10px">Loading...</div>';
  sb.style.display='none'; kb.style.display='none';
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&key=${KEY}&maxResults=20&regionCode=US&videoDuration=medium&videoEmbeddable=true&q=${encodeURIComponent(query)}`);
    const d=await r.json(); g.innerHTML='';
    d.items.forEach((v,i)=>{
      const c=document.createElement('div');c.className='card';c.tabIndex=0;
      c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div>${v.snippet.title}</div>`;
      c.onclick=()=>play(v.id.videoId);
      g.appendChild(c);
      if(i===0)setTimeout(()=>c.focus(),30);
    });
  }catch(e){g.innerHTML='<div style="color:#f66">Error</div>'}
}

function play(id){
  p.classList.add('show');
  if(YTP)YTP.destroy();
  YTP=new YT.Player('f',{videoId:id,playerVars:{autoplay:1,controls:0,playsinline:1}});
  pp.onclick=()=>YTP.getPlayerState()===1?YTP.pauseVideo():YTP.playVideo();
  b10.onclick=()=>YTP.seekTo(YTP.getCurrentTime()-10,1);
  f10.onclick=()=>YTP.seekTo(YTP.getCurrentTime()+10,1);
  x.onclick=()=>{p.classList.remove('show');YTP.stopVideo();document.querySelector('.card')?.focus()};
  fs.onclick=()=>document.fullscreenElement?document.exitFullscreen():p.requestFullscreen();
}

function search(){const v=q.value.trim();if(v){sb.style.display='none';kb.style.display='none';load(v)}}

document.querySelectorAll('.tab').forEach((tab,i)=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    if(i===0)load('trending videos US');
    if(i===1){sb.style.display='flex';kb.style.display='grid';g.innerHTML='<div style="grid-column:1/-1;padding:15px;color:#666;text-align:center;font-size:10px">Tap keys below</div>';q.value='';setTimeout(()=>kb.querySelector('button').focus(),30)}
    if(i===2)load('news');
    if(i===3)load('sports');
    if(i===4)load('gaming');
    if(i===5)load('live');
  };
});

// Simplified navigation - only arrows
document.addEventListener('keydown',e=>{
  if(p.classList.contains('show')&&e.key==='Escape'){e.preventDefault();x.click();return}
  if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return;
  e.preventDefault();
  const f=document.activeElement;
  const cards=[...g.querySelectorAll('.card')], keys=[...kb.querySelectorAll('button')], tabs=[...document.querySelectorAll('.tab')];
  const ci=cards.indexOf(f), ki=keys.indexOf(f), ti=tabs.indexOf(f);

  if(ki>=0){
    if(e.key==='ArrowRight'&&keys[ki+1])keys[ki+1].focus();
    if(e.key==='ArrowLeft'&&ki>0)keys[ki-1].focus();
    if(e.key==='ArrowDown'&&keys[ki+10])keys[ki+10].focus();
    if(e.key==='ArrowDown'&&!keys[ki+10]&&ki>=20)document.getElementById('go').focus();
    if(e.key==='ArrowUp'&&keys[ki-10])keys[ki-10].focus();
  }else if(f.id==='go'||f.id==='clr'){
    if(e.key==='ArrowUp')keys[26]?.focus();
    if(e.key==='ArrowLeft')document.getElementById('clr').focus();
    if(e.key==='ArrowRight')document.getElementById('go').focus();
  }else{
    if(e.key==='ArrowRight'){if(ci>=0&&ci%2===0&&cards[ci+1])cards[ci+1].focus();else if(ti>=0&&ti<5)tabs[ti+1].focus()}
    if(e.key==='ArrowLeft'){if(ci>=0&&ci%2===1)cards[ci-1].focus();else if(ti>0)tabs[ti-1].focus()}
    if(e.key==='ArrowDown'){if(ci>=0&&cards[ci+2])cards[ci+2].focus();else if(ci>=0)tabs[0].focus();else if(ti>=0)cards[0]?.focus()}
    if(e.key==='ArrowUp'&&ci>=2)cards[ci-2].focus();
  }
});

load('trending videos US');
</script>
</body>
</html>
