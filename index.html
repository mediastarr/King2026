<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:Arial,sans-serif;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:24px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 6px;font-size:10px;font-weight:bold;border-bottom:1px solid #333;flex-shrink:0}
.header span:first-child{color:#0ff}
.search-display{background:#001418;padding:6px;text-align:center;border-bottom:2px solid #0ff;display:none;flex-shrink:0}
.search-display.show{display:block}
.search-text{font-size:20px;color:#0ff;font-family:'Courier New',monospace;min-height:24px;font-weight:bold;letter-spacing:1px}
.search-hint{font-size:9px;color:#0aa;margin-top:2px}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.grid{flex:1;overflow-y:auto;overflow-x:hidden;padding:3px;display:grid;grid-template-columns:1fr 1fr;gap:3px;align-content:start;background:#000}
.card{background:#111;border:2px solid #333;padding:2px;cursor:pointer}
.card:focus{border-color:#0ff;outline:none;background:#002020}
.card img{width:100%;height:58px;object-fit:cover;display:block;background:#000}
.card-title{font-size:8px;height:16px;overflow:hidden;line-height:1.1;margin-top:1px}
.keyboard-area{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:10}
.keyboard-area.show{display:flex}
.kb-display{background:#001a1a;padding:8px;text-align:center;border-bottom:2px solid #0ff;flex-shrink:0}
.kb-text{font-size:24px;color:#0ff;min-height:28px;font-weight:bold;font-family:'Courier New',monospace}
.kb-hint{font-size:9px;color:#0aa;margin-top:2px}
.kb-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;overflow-y:auto;background:#000;align-content:start}
.kb-key{background:#222;border:2px solid #555;color:#fff;font-size:20px;font-weight:bold;border-radius:5px;min-height:46px;display:flex;align-items:center;justify-content:center}
.kb-key:active{background:#0ff;color:#000;border-color:#0ff}
.kb-key.wide{grid-column:span 2;font-size:15px}
.kb-key.enter{background:#003300;border-color:#0a0;color:#0f0}
.kb-key.enter:active{background:#0f0;color:#000}
.kb-key.back{background:#330000;border-color:#a00;color:#faa}
.kb-key.back:active{background:#f00;color:#fff}
.kb-key.space{grid-column:span 4;font-size:13px;background:#0a0a0a}
.tabs{display:flex;height:28px;background:#111;border-top:1px solid #333;flex-shrink:0}
.tab{flex:1;background:#000;border:1px solid #333;color:#666;font-size:8px;font-weight:bold}
.tab.active{background:#002020;color:#0ff;border-color:#0ff}
.player{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:100}
.player.show{display:flex}
.player iframe{flex:1;border:0;background:#000}
.controls{height:36px;background:#111;display:flex;gap:2px;padding:2px;border-top:1px solid #333;flex-shrink:0}
.ctrl{flex:1;background:#222;border:none;color:#fff;font-size:13px;font-weight:bold;border-radius:3px}
.ctrl:active{background:#0ff;color:#000}
.ctrl.close{background:#500}
</style>
</head>
<body>
<div class="header">
  <span>▶ STARRTUBE</span>
  <span id="time"></span>
</div>

<div class="search-display" id="searchDisplay">
  <div class="search-text" id="searchText"></div>
  <div class="search-hint">Search results</div>
</div>

<div class="content">
  <div class="grid" id="grid"></div>

  <div class="keyboard-area" id="kbArea">
    <div class="kb-display">
      <div class="kb-text" id="kbText">_</div>
      <div class="kb-hint" id="kbHint">Tap letters to search</div>
    </div>
    <div class="kb-grid" id="kbGrid"></div>
  </div>
</div>

<div class="player" id="player">
  <iframe id="frame" allow="autoplay;fullscreen"></iframe>
  <div class="controls">
    <button class="ctrl" id="rew">-10</button>
    <button class="ctrl" id="play">▶</button>
    <button class="ctrl" id="fwd">+10</button>
    <button class="ctrl" id="full">⛶</button>
    <button class="ctrl close" id="close">✕</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active">HOME</button>
  <button class="tab">SEARCH</button>
  <button class="tab">NEWS</button>
  <button class="tab">SPORTS</button>
  <button class="tab">MUSIC</button>
  <button class="tab">LIVE</button>
</div>

<script>
const API_KEY = 'AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let ytPlayer = null;
let searchQuery = '';
let lastTapTime = 0;
let lastTapKey = '';

// Clock
setInterval(() => {
  document.getElementById('time').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}, 1000);

// Load YouTube API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

// Build working keyboard
const kbGrid = document.getElementById('kbGrid');
const kbText = document.getElementById('kbText');
const kbHint = document.getElementById('kbHint');

function updateKbDisplay() {
  kbText.textContent = searchQuery || '_';
  kbText.style.opacity = searchQuery? '1' : '0.5';
  kbHint.textContent = searchQuery? `${searchQuery.length} chars - tap SEARCH` : 'Tap letters to search';
}

function addKey(char, display) {
  const btn = document.createElement('button');
  btn.className = 'kb-key';
  btn.textContent = display || char;
  btn.type = 'button';

  btn.onclick = () => {
    const now = Date.now();
    // Anti-double tap
    if (char === lastTapKey && (now - lastTapTime) < 280) {
      kbHint.textContent = '⚠ Blocked double-tap';
      setTimeout(updateKbDisplay, 600);
      return;
    }
    lastTapKey = char;
    lastTapTime = now;

    searchQuery += char.toLowerCase();
    updateKbDisplay();

    btn.style.background = '#0ff';
    setTimeout(() => btn.style.background = '', 120);
  };

  kbGrid.appendChild(btn);
}

// Add A-Z
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c => addKey(c));

// Space
const space = document.createElement('button');
space.className = 'kb-key space';
space.textContent = 'SPACE';
space.type = 'button';
space.onclick = () => {
  searchQuery += ' ';
  updateKbDisplay();
};
kbGrid.appendChild(space);

// DELETE
const del = document.createElement('button');
del.className = 'kb-key wide';
del.textContent = 'DELETE';
del.type = 'button';
del.style.fontSize = '14px';
del.onclick = () => {
  searchQuery = searchQuery.slice(0, -1);
  updateKbDisplay();
};
kbGrid.appendChild(del);

// CLEAR
const clear = document.createElement('button');
clear.className = 'kb-key wide';
clear.textContent = 'CLEAR';
clear.type = 'button';
clear.style.fontSize = '14px';
clear.onclick = () => {
  searchQuery = '';
  updateKbDisplay();
};
kbGrid.appendChild(clear);

// BACK
const back = document.createElement('button');
back.className = 'kb-key wide back';
back.textContent = '← BACK';
back.type = 'button';
back.onclick = () => {
  hideKeyboard();
  showHome();
};
kbGrid.appendChild(back);

// SEARCH/ENTER
const enter = document.createElement('button');
enter.className = 'kb-key wide enter';
enter.textContent = 'SEARCH ↵';
enter.type = 'button';
enter.onclick = doSearch;
kbGrid.appendChild(enter);

function showKeyboard() {
  document.getElementById('kbArea').classList.add('show');
  document.getElementById('searchDisplay').classList.remove('show');
  searchQuery = '';
  updateKbDisplay();
}

function hideKeyboard() {
  document.getElementById('kbArea').classList.remove('show');
}

async function loadVideos(query) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div style="grid-column:1/-1;padding:20px;text-align:center;color:#555;font-size:10px">Loading...</div>';
  hideKeyboard();

  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&key=${API_KEY}&maxResults=20&regionCode=US&videoEmbeddable=true&safeSearch=moderate&q=${encodeURIComponent(query)}`;
    const res = await fetch(url);
    const data = await res.json();

    grid.innerHTML = '';
    data.items.forEach(video => {
      const card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      card.innerHTML = `
        <img src="${video.snippet.thumbnails.medium.url}" alt="">
        <div class="card-title">${video.snippet.title}</div>
      `;
      card.onclick = () => playVideo(video.id.videoId);
      grid.appendChild(card);
    });

    if (grid.firstChild) grid.firstChild.focus();
  } catch (e) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:20px;color:#f66;text-align:center">Error loading videos</div>';
  }
}

function playVideo(videoId) {
  const player = document.getElementById('player');
  player.classList.add('show');

  if (ytPlayer) ytPlayer.destroy();

  ytPlayer = new YT.Player('frame', {
    videoId: videoId,
    playerVars: {
      autoplay: 1,
      controls: 0,
      modestbranding: 1,
      playsinline: 1,
      rel: 0
    }
  });

  document.getElementById('play').onclick = () => {
    const state = ytPlayer.getPlayerState();
    state === 1? ytPlayer.pauseVideo() : ytPlayer.playVideo();
  };
  document.getElementById('rew').onclick = () => ytPlayer.seekTo(ytPlayer.getCurrentTime() - 10, true);
  document.getElementById('fwd').onclick = () => ytPlayer.seekTo(ytPlayer.getCurrentTime() + 10, true);
  document.getElementById('close').onclick = () => {
    player.classList.remove('show');
    if (ytPlayer) ytPlayer.stopVideo();
  };
  document.getElementById('full').onclick = () => {
    document.fullscreenElement? document.exitFullscreen() : player.requestFullscreen();
  };
}

function doSearch() {
  const q = searchQuery.trim();
  if (!q) {
    kbHint.textContent = 'Type something first!';
    setTimeout(updateKbDisplay, 1000);
    return;
  }

  document.getElementById('searchText').textContent = q;
  document.getElementById('searchDisplay').classList.add('show');
  hideKeyboard();
  loadVideos(q);
  searchQuery = '';
}

function showHome() {
  document.getElementById('searchDisplay').classList.remove('show');
  loadVideos('trending videos 2024');
}

// Tabs
document.querySelectorAll('.tab').forEach((tab, i) => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const queries = ['trending videos 2024', '', 'breaking news', 'sports highlights', 'popular music', 'live streams'];
    if (i === 1) {
      showKeyboard();
    } else {
      hideKeyboard();
      document.getElementById('searchDisplay').classList.remove('show');
      loadVideos(queries[i]);
    }
  };
});

// Start
showHome();
updateKbDisplay();
</script>
</body>
</html>
