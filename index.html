<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:Arial;width:600px;height:600px;display:flex;flex-direction:column;overflow:hidden}
.header{height:24px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 6px;font-size:10px;font-weight:bold;border-bottom:1px solid #333}
.header span:first-child{color:#0ff}
.grid{flex:1;overflow-y:auto;padding:3px;display:grid;grid-template-columns:1fr 1fr;gap:3px;align-content:start;background:#000}
.card{background:#111;border:2px solid #333;padding:2px}
.card:focus{border-color:#0ff;outline:none;background:#002020}
.card img{width:100%;height:58px;object-fit:cover;display:block}
.card-title{font-size:8px;height:16px;overflow:hidden;line-height:1.1;margin-top:1px}
.keyboard-area{position:absolute;inset:0;background:#000;display:none;flex-direction:column;z-index:10}
.keyboard-area.show{display:flex}
.kb-display{background:#001a1a;padding:8px;text-align:center;border-bottom:2px solid #0ff}
.kb-text{font-size:24px;color:#0ff;min-height:28px;font-weight:bold;font-family:'Courier New',monospace}
.kb-grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:4px;overflow-y:auto;background:#000;align-content:start}
.kb-key{background:#222;border:3px solid #555;color:#fff;font-size:20px;font-weight:bold;border-radius:5px;min-height:46px;display:flex;align-items:center;justify-content:center}
.kb-key:focus{background:#004444;border-color:#0ff;color:#0ff;outline:none;box-shadow:0 0 10px #0ff}
.kb-key.wide{grid-column:span 2;font-size:15px}
.kb-key.enter{background:#003300;border-color:#0a0;color:#0f0}
.kb-key.back{background:#330000;border-color:#a00;color:#faa}
.kb-key.space{grid-column:span 4}
.tabs{display:flex;height:28px;background:#111;border-top:1px solid #333}
.tab{flex:1;background:#000;border:1px solid #333;color:#666;font-size:8px;font-weight:bold}
.tab.active{background:#002020;color:#0ff;border-color:#0ff}

/* PLAYER WITH BIG BACK BUTTON */
.player{position:fixed;inset:0;background:#000;display:none;z-index:100}
.player.show{display:block}
.back-bar{position:absolute;top:0;left:0;right:0;height:50px;background:linear-gradient(to bottom,rgba(0,0,0,0.9),rgba(0,0,0,0.7));display:flex;align-items:center;padding:0 10px;z-index:200;pointer-events:none}
.back-button{pointer-events:auto;background:#ff0000;color:#fff;border:3px solid #fff;padding:8px 20px;font-size:16px;font-weight:bold;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.8);min-width:100px;text-align:center}
.back-button:active{background:#fff;color:#f00;transform:scale(0.95)}
.player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
</style>
</head>
<body>
<div class="header"><span>▶ STARRTUBE</span><span id="time"></span></div>
<div class="content" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">
  <div class="grid" id="grid"></div>
  <div class="keyboard-area" id="kbArea">
    <div class="kb-display"><div class="kb-text" id="kbText">_</div></div>
    <div class="kb-grid" id="kbGrid"></div>
  </div>
</div>

<!-- VIDEO PLAYER WITH BACK BUTTON TOP LEFT -->
<div class="player" id="player">
  <div class="back-bar">
    <button class="back-button" id="backBtn">◀ BACK</button>
  </div>
  <iframe id="frame" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<div class="tabs">
  <button class="tab active">HOME</button>
  <button class="tab">SEARCH</button>
  <button class="tab">NEWS</button>
  <button class="tab">SPORTS</button>
  <button class="tab">MUSIC</button>
  <button class="tab">LIVE</button>
</div>

<script>
const API_KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let searchQuery='',lastTap=0,lastKey='';
setInterval(()=>document.getElementById('time').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),1000);

const kbGrid=document.getElementById('kbGrid'),kbText=document.getElementById('kbText');
function updateKb(){kbText.textContent=searchQuery||'_';}
function createKey(c,d,w=false,cls=''){const b=document.createElement('button');b.className='kb-key'+(w?' wide':'')+(cls?' '+cls:'');b.textContent=d||c;b.onclick=()=>{const n=Date.now();if(c&&c===lastKey&&(n-lastTap)<280)return;lastKey=c;lastTap=n;if(c==='ENTER'){doSearch();return;}if(c==='BACK'){hideKb();return;}if(c==='DEL')searchQuery=searchQuery.slice(0,-1);else if(c==='CLEAR')searchQuery='';else if(c)searchQuery+=c.toLowerCase();updateKb();};kbGrid.appendChild(b);}
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c=>createKey(c));createKey(' ','SPACE',1,'space');createKey('DEL','DELETE',1);createKey('CLEAR','CLEAR',1);createKey('BACK','← BACK',1,'back');createKey('ENTER','SEARCH',1,'enter');
function showKb(){document.getElementById('kbArea').classList.add('show');searchQuery='';updateKb();}
function hideKb(){document.getElementById('kbArea').classList.remove('show');}

async function loadVideos(q){const g=document.getElementById('grid');g.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:#555">Loading...</div>';hideKb();try{const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&key=${API_KEY}&maxResults=20&q=${encodeURIComponent(q)}`);const d=await r.json();g.innerHTML='';d.items.forEach(v=>{const c=document.createElement('div');c.className='card';c.tabIndex=0;c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div class="card-title">${v.snippet.title}</div>`;c.onclick=()=>playVideo(v.id.videoId);g.appendChild(c);});}catch(e){g.innerHTML='<div style="color:#f66;padding:20px">Error</div>';}}

function playVideo(id){
  document.getElementById('player').classList.add('show');
  document.getElementById('frame').src=`https://www.youtube.com/embed/${id}?autoplay=1&controls=1&modestbranding=1&rel=0`;
}

// BACK BUTTON - TOP LEFT
document.getElementById('backBtn').onclick=function(){
  document.getElementById('player').classList.remove('show');
  document.getElementById('frame').src='';
};

function doSearch(){const q=searchQuery.trim();if(q){hideKb();loadVideos(q);searchQuery='';}}
document.querySelectorAll('.tab').forEach((t,i)=>{t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const qs=['trending','','news','sports','music','live'];if(i===1)showKb();else loadVideos(qs[i]);};});

loadVideos('trending');updateKb();
</script>
</body>
</html>
