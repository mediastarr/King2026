<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=600,height=600,user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:Arial,sans-serif;width:600px;height:600px;overflow:hidden;display:flex;flex-direction:column}
.top{height:24px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 5px;font-size:10px;font-weight:bold;border-bottom:2px solid #333}
.search-box{background:#001a1a;border:2px solid #0ff;padding:8px;display:none}
.search-box.show{display:block}
.search-label{font-size:10px;color:#0aa;margin-bottom:3px}
.search-text{font-size:24px;color:#0ff;font-family:'Courier New',monospace;min-height:30px;letter-spacing:2px;font-weight:bold}
.grid{flex:1;overflow:auto;padding:2px;display:grid;grid-template-columns:1fr 1fr;gap:2px;align-content:start;background:#000}
.card{background:#111;border:2px solid #333;padding:2px}
.card:focus{border-color:#0ff;outline:none}
.card img{width:100%;height:60px;object-fit:cover;display:block;background:#000}
.card div{font-size:8px;height:18px;overflow:hidden;line-height:1.1;padding-top:1px}
.tabs{display:flex;height:30px;background:#111;border-top:2px solid #333}
.tab{flex:1;background:#000;border:1px solid #333;color:#666;font-size:8px;font-weight:bold}
.tab.active{background:#002222;color:#0ff;border-color:#0ff}
.keyboard{background:#000;padding:4px;display:none;grid-template-columns:repeat(5,1fr);gap:4px;border-top:3px solid #0ff}
.keyboard.show{display:grid}
.key{background:#222;border:3px solid #555;color:#fff;height:48px;font-size:20px;font-weight:bold;border-radius:6px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.key:active{background:#0ff;color:#000;border-color:#0ff;transform:scale(0.92)}
.key.wide{grid-column:span 2;font-size:16px}
.key.go{background:#004444;border-color:#0aa;color:#0ff;font-size:18px}
.key.go:active{background:#0ff;color:#000}
.key.del{background:#440000;border-color:#a00;color:#faa}
.player{position:fixed;inset:0;background:#000;display:none;flex-direction:column;z-index:999}
.player.show{display:flex}
.player iframe{flex:1;border:0;background:#000}
.controls{height:40px;background:#111;display:flex;gap:3px;padding:3px;border-top:2px solid #333}
.btn{flex:1;background:#333;border:none;color:#fff;font-size:14px;font-weight:bold;border-radius:4px}
.btn:active{background:#0ff;color:#000}
</style>
</head>
<body>
<div class="top"><div>STARRTUBE</div><div id="clk"></div></div>

<div class="search-box" id="sb">
  <div class="search-label">TYPING:</div>
  <div class="search-text" id="st">_</div>
</div>

<div class="grid" id="grid"></div>

<div class="keyboard" id="kb"></div>

<div class="player" id="pl">
  <iframe id="fr" allow="autoplay;fullscreen"></iframe>
  <div class="controls">
    <button class="btn" id="b10">-10</button>
    <button class="btn" id="pp">▶/❚❚</button>
    <button class="btn" id="f10">+10</button>
    <button class="btn" id="fs">⛶</button>
    <button class="btn" id="cl" style="background:#600">X</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active">HOME</button>
  <button class="tab">SEARCH</button>
  <button class="tab">NEWS</button>
  <button class="tab">SPORTS</button>
  <button class="tab">GAME</button>
  <button class="tab">LIVE</button>
</div>

<script>
const KEY='AIzaSyDurH02crJj5sqXrVO2Ts1ecUPviphWDMU';
let YT, query='', lastTap=0;
setInterval(()=>clk.textContent=new Date().toLocaleTimeString([], {h:'2-digit',m:'2-digit'}));

// UPDATE DISPLAY
function upd(){
  st.textContent = query || '_';
  st.style.opacity = query ? '1' : '0.3';
}

// BUILD HUGE KEYBOARD
const kb=document.getElementById('kb');
const keys='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

keys.split('').forEach(l=>{
  const k=document.createElement('button');
  k.className='key';
  k.textContent=l;
  k.type='button';
  // SUPER SIMPLE - just add letter
  k.addEventListener('touchstart',function(e){e.preventDefault();addLet(l)}, {passive:false});
  k.addEventListener('mousedown',function(e){e.preventDefault();addLet(l)});
  k.addEventListener('click',function(e){e.preventDefault()});
  kb.appendChild(k);
});

function addLet(l){
  const now=Date.now();
  if(now-lastTap<100)return; // Block doubles
  lastTap=now;
  query += l.toLowerCase();
  upd();
  // Flash feedback
  event.target.style.background='#0ff';
  setTimeout(()=>event.target.style.background='',80);
}

// ACTION KEYS - MADE HUGE
[['SPACE',' '],['DEL',''],['CLEAR',''],['SEARCH','']].forEach(([txt,val])=>{
  const k=document.createElement('button');
  k.className='key wide ' + (txt==='SEARCH'?'go':txt==='DEL'?'del':'');
  k.textContent=txt;
  k.type='button';
  k.style.height='52px';
  const fn=(e)=>{e.preventDefault();
    if(txt==='SPACE')query+=' ';
    else if(txt==='DEL')query=query.slice(0,-1);
    else if(txt==='CLEAR')query='';
    else if(txt==='SEARCH'){if(query.trim())doSearch();}
    upd();
  };
  k.addEventListener('touchstart',fn,{passive:false});
  k.addEventListener('mousedown',fn);
  k.addEventListener('click',e=>e.preventDefault());
  kb.appendChild(k);
});

// YouTube API
const s=document.createElement('script');s.src='https://www.youtube.com/iframe_api';document.head.appendChild(s);

async function load(q){
  grid.innerHTML='<div style="grid-column:1/-1;padding:20px;text-align:center;color:#555">Loading...</div>';
  sb.classList.remove('show');kb.classList.remove('show');
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&key=${KEY}&maxResults=18&regionCode=US&videoDuration=medium&q=${encodeURIComponent(q)}`);
    const d=await r.json();grid.innerHTML='';
    d.items.forEach(v=>{
      const c=document.createElement('div');c.className='card';c.tabIndex=0;
      c.innerHTML=`<img src="${v.snippet.thumbnails.medium.url}"><div>${v.snippet.title}</div>`;
      c.onclick=()=>play(v.id.videoId);
      grid.appendChild(c);
    });
    grid.firstChild?.focus();
  }catch(e){grid.innerHTML='<div style="color:red">Error</div>'}
}

function play(id){
  pl.classList.add('show');
  if(YT)YT.destroy();
  YT=new YT.Player('fr',{videoId:id,playerVars:{autoplay:1,controls:0,playsinline:1}});
  pp.onclick=()=>YT.getPlayerState()===1?YT.pauseVideo():YT.playVideo();
  b10.onclick=()=>YT.seekTo(YT.getCurrentTime()-10,1);
  f10.onclick=()=>YT.seekTo(YT.getCurrentTime()+10,1);
  cl.onclick=()=>{pl.classList.remove('show');YT.destroy()};
  fs.onclick=()=>document.fullscreenElement?document.exitFullscreen():pl.requestFullscreen();
}

function doSearch(){
  const q=query.trim();
  if(!q)return;
  query='';upd();
  sb.classList.remove('show');kb.classList.remove('show');
  load(q);
}

// TABS
document.querySelectorAll('.tab').forEach((t,i)=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    if(i===0)load('trending');
    else if(i===1){query='';upd();sb.classList.add('show');kb.classList.add('show');grid.innerHTML='';}
    else if(i===2)load('news');
    else if(i===3)load('sports');
    else if(i===4)load('gaming');
    else load('live');
  };
});

// Start
load('trending');
upd();
</script>
</body>
</html>
